body:
  text: 卷一守正辟邪論聖人立法以治天下皆取乎正人生天地間六氣感於外七情傷於內加以飢飽勞役其病固難枚舉余惟以目病言之夫目為肝竅輪分五臟腎水涵之膽汁統之凡有所感皆能為患惟審其虛者補之實者瀉之或邪盛正虛補中兼瀉瀉中兼補此正法也不謂正法失傳而邪法紛起受其害者可勝道哉不得不嚴為辨之如有以針挑其上下胞者先出其血後以金器擦其內瞼久之必生翳障蓋血傷邪不散也有以舌舔其目珠者博古人孝感之名而非出於誠心往往傷破其珠蓋舌乃心之苗瞳神為腎之精以心火克其腎水故也有食辛辣飲燒酒烘火向日謬云以熱攻熱是齎敵以糧授賊以刃也有刮指甲金玉等屑點眼者以脆嫩之質而受堅剛之克豈有不傷之理乎有以黃連湯薄荷湯泥漿井水雞子清水晶金銀等物取其涼氣以尉洗必致血凝變症誠可慮也更有一種醫人不察形色部位臟腑經絡輒用菊花洗心散龍膽四物湯三黃湯羊肝丸之類隨症亂治此真徐靈胎所謂劣醫矣大抵目病以肝腎為本捨本而從標皆非正法邪正之辨彰明較著儒家有正宗醫家亦有正宗學者慎毋惑於旁門也面部定位圖解靈樞經曰鼻者肺之官目者肝之官口唇者脾之官舌者心之官耳者腎之官經絡氣血皆上於面而走空竅其精陽氣上走於目而為睛其彆氣走於耳而為聽其宗氣上出於鼻而為臭其濁氣出於胃走唇口而為味上下胞瞼屬脾土為肉輪大眥屬心君火小眥屬心包絡相火為血輪白睛屬肺金為氣輪青睛屬肝木為風輪瞳神屬腎水為水輪五輪八廓大略五輪者五臟精華之發現也八廓者臟腑部位之所在也病發定在五輪而病之淺深進退必於八廓驗之左目為陽陽道順行故廓之經位法象亦以順行右目為陰陰道逆行故廓之經位法象亦以逆行靈樞大惑論曰五臟六腑之精氣皆上注於目而為之精精之窠為眼骨之精為瞳子筋之精為黑眼血之精為絡其窠氣之精為白眼肌肉之精為約束裹擷筋肉血氣之精而與目併為系上屬於腦後出於項中目之五輪八廓內經未著其名故其言曰骨之精為瞳子腎主骨在色為黑是即所謂黑睛之水輪也筋之精為黑眼肝主筋在色為蒼是即青睛之風輪也血之精為絡心主血在色為赤是即大小眥之血輪也其窠氣之精為白眼肺主氣在色為白是即白睛之氣輪也肌肉之精為約束脾主肌肉在色為黃是即上下胞之肉輪也然則五輪本於五經內經已言之後人特命之名耳又曰裹擷筋骨血氣之精而與脈併為系是即八廓之先路也五輪在外有形可見八廓在內無迹可尋故或言八廓有名無位也茲余俱録其文而分注之知輪廓之説為有根柢云養吾氏識五輪解目有五輪稟於五行原於五臟輪取圓轉層護猶之周廬環衛以奠皇居也蓋金之精騰結而為氣輪木之精騰結而為風輪火之精騰結而為血輪土之精騰結而為肉輪水之精騰結而為水輪氣輪者目之白睛是也內應乎肺西方庚辛申酉之金肺主氣故曰氣輪金為五行之至堅故氣輪亦堅於四輪居外而為固也風輪者白睛內青睛是也內應乎肝東方甲乙寅卯之木肝木生風故曰風輪此輪青翠內包膏汁有涵養瞳神之功其色青故目青瑩者為順也血輪者目大小眥是也內應乎心南方丙丁巳午之火心主血故曰血輪有兩心而無正輪心君火也通於大眥命門為小心小心相火也通於小眥火尚赤故取紅活者為順也肉輪者目兩胞是也中央戊己辰戌丑未之土內應乎脾故曰肉輪夫土為五行之主故四輪亦為脾所包涵土主靜故目閉則靜而不用此藏納歸靜之用也脾有兩葉摩化水穀目有兩胞動靜相應其色尚黃得血為潤故目之兩胞以黃澤為順也然四輪者皆不能鑑物惟逐層兜裹以保水輪水輪者內應乎腎北方壬癸亥子水也腎屬水故曰水輪中有黑瑩一點為能鑑萬類察秋毫所謂瞳神者也五輪具而後為全目目全而後為完人治目者可弗明辨之乎八廓解夫五輪為捍禦之司周防於外八廓為轉運之使應接於內廓取恢廓之意經言使道墜以長蓋人身面部自齒以後至會厭深三寸半咽門至胃長一尺六寸則臟腑之於目相去甚遠廓其輸將精液之道路猶之經塗九軌以通往來也乾居西北絡通大腸之腑臟屬於肺肺與大腸為表裡上運清純下輸糟粕為傳送之官故曰傳道廓坎居正北絡通膀胱之腑臟屬於腎腎與膀胱為表裡乃真水之源以輸精液故曰精液廓艮位東北絡通上焦與命門上焦與命門會合諸陰分輸百脈故曰會陰廓震位正東絡通膽之府臟屬於肝肝與膽為表裡主運清純不受汙濁故曰清淨廓巽位東南絡通中焦與肝之絡肝絡通血以滋養中焦分氣血以為化生故曰養化廓離居正南絡通小腸之府臟屬於心心與小腸為表裡為諸陽受氣之胞故曰抱陽廓坤位西南絡通胃之府臟屬於脾脾與胃為表裡主納水穀以養生故曰水穀廓兌位正西絡通下焦與腎之絡腎絡與下焦主持陰精養化生之源故曰關泉廓夫臟腑之相配內經已有定法至三焦之分配肝腎者此目之脈絡配法也蓋目竅於肝主於腎故有二絡之分配察乎二目經絡之間昭然可見矣輪廓古云經絡不明盲子夜行驗廓之病與輪不同輪以通部形色為斷而廓以輪上之經絡為形症或粗細連斷或虯直赤紫其脈起於何部侵及何部以辨病在於何臟及受病之淺深輕重血氣之虛實盛衰邪氣之自病傳病經絡之生克順逆而施治之耳有以八廓如三焦有名而無實不知以八廓比三焦則八廓尤為易辨三焦在內而不見但有膈上膈下之分八廓見症分明顯有絲脈之可辨焉得謂有名無實哉運氣總論素問天元紀大論曰天有五行以御五位當其位則正過則淫五行者金木水火土也五位者甲乙位東丙丁位南庚辛位西壬癸位北戊己位中宮蓋天數五而五陰五陽為十干地數六而六陰六陽為十二支然天干之五必得地支之六以為節地支之六必得天干之五以為制如子午之上為少陰君火丑未之上為太陰濕土寅申之上為少陽相火卯酉之上為陽明燥金辰戌之上為太陽寒水巳亥之上為厥陰風木是六氣之在天而以地支之六為節也甲己為土運乙庚為金運丙辛為水運丁壬為木運戊癸為火運是五行之在地而以天干之五為制也以地支而應天之六氣以天干而合地之五行而後六甲成歲氣備又曰在天為風在地為木在天為熱在地為火在天為濕在地為土在天為燥在地為金在天為寒在地為水蓋無形者即於有形測之天地雖大瞭如指掌矣五運行大論曰風為肝肝生筋筋生心火為心心生血血生脾濕為脾脾生肉肉生肺燥為肺肺生皮毛皮毛生腎寒為腎腎生骨髓骨髓生肝此運氣相生之序也又曰風傷筋燥勝風熱傷氣寒勝熱濕傷肉風勝濕燥傷皮毛濕勝燥寒傷血燥勝寒此運氣相勝之道也六微旨大論曰相火之下水氣承之水位之下土氣承之土位之下風氣承之風位之下金氣承之金位之下火氣承之君火之下陰精承之此運氣承製之理也醫學綱目曰風木盛則病化風燥金盛則肝為邪攻而病亦化風寒水盛則病化寒濕土盛則腎為邪攻而病亦化寒燥金盛則病化膹郁火熱盛則肺為邪攻而病亦化膹郁濕土盛則病化濕風木盛則脾為邪攻而病亦化濕火熱盛則病化火熱寒水盛則心為邪攻而病亦化火熱此運氣移化之過也張子正蒙曰陰陽之精互藏其宅則各得其所安若陰陽之氣則循環迭至聚散相蕩蓋相兼相制欲一之而不能朱子曰五行各一其性然一物又各具五行之理故氣有餘則制己所勝而侮所不勝其不及則己所不勝侮而乘之己所勝輕而侮之人在氣交之中天氣通於鼻地氣通於口感而受之為病萬端而目疾特九竅之一耳治之如法應手可愈惟在辨明運氣之勝復則藥與症合不至孟浪投劑矣素問五運論曰天地者萬物之上下左右者陰陽之道路上謂司天位在南方則面北立左右乃左西右東也下謂在泉位在北方則面南立左右乃左東右西也故上下異而左右殊天氣右旋而降於下地氣左旋而升於上左右周天余而復會也如寅申歲司天少陽火氣左間陽明燥氣右間太陰濕氣在泉厥陰風氣左間少陰熱氣右間太陽寒氣卯酉歲司天陽明燥氣左間太陽寒氣右間少陽火氣在泉少陰熱氣左間太陰濕氣右間厥陰風氣辰戌歲司天太陽寒氣左間厥陰風氣右間陽明燥氣在泉太陰濕氣左間少陽火氣右間少陰熱氣巳亥歲司天厥陰風氣左間少陰熱氣右間太陽寒氣在泉少陽火氣左間陽明燥氣右間太陰濕氣子午歲司天少陰熱氣左間太陰濕氣右間厥陰風氣在泉陽明燥氣左間太陽寒氣右間少陽火氣丑未歲司天太陰濕氣左間少陽火氣右間少陰熱氣在泉太陽寒氣左間厥陰風氣右間陽明燥氣司天主上半年自大寒日後通主上半年也在泉主下半年自大暑日後主下半年也運氣全書云陰陽相遘分六位而寒暑弛張日月推移運四時而氣令更變自十二月中氣大寒日交木之初氣次至二月中氣春分日交君火之二氣次至四月中氣小滿日交相火之三氣次至六月中氣大暑日交土之四氣次至八月中氣秋分日交金之五氣次至十月中氣小雪日交水之六氣每氣各主六十日八十七刻半總之乃三百六十五日二十五刻共周一歲也若歲外之餘及小月之日則不及也厥陰木為初氣者方春氣之始也木生火故少陰君火少陽相火次之火生土故太陰土次之土生金故陽明金次之金生水故太陽水次之六氣總論素問天元紀大論曰天有五行以御五位以生寒暑燥濕風火是為六氣當其位則正過則淫人有犯其邪者皆能為目患風則流淚赤腫寒則血凝紫脹暑則紅赤昏花濕則沿爛成癬燥則緊澀眵結火則紅腫壅痛風宜散而寒宜溫暑宜清而濕宜利燥宜潤而火宜涼辨之既明治亦易也然其中有相挾而來者蓋風為百病之長如挾寒挾暑挾濕挾燥挾火之類有相從而化者如風邪化火寒邪化火濕邪化火燥邪化火之類風邪發於前火邪繼於後故凡人之病目者皆以為風火也然風火之症最宜詳辨苟一見火症無論有風無風多從散治鮮不為害風本陽邪必有外感方是真風因風生熱風去火自息此宜散之風也若無外感只因內火上炎熱極生風熱去風自息此不宜散之風也又有相雜而至者以四時言之冬月致病只三字風寒火是也春兼四字風寒濕火是也夏兼五字風寒暑濕火是也秋只四字風寒燥火是也然其中有伏藏有變化亦不得執一而治奈何醫者治目初起紅腫眵淚不問何邪概行表散散之不效隨用和解解之不去隨用清涼涼之不效繼以補益幸則引為己功不幸則委之天命恬不為怪良可嘆也余著此論一一剖悉使紛紜錯雜之症不至混淆更以臟腑經絡形色脈象參之無遁情矣風素問金匱真言論曰天有八風經有五風靈樞九宮八風篇曰大弱風謀風剛風折風大剛風凶風嬰兒風弱風是為八風五風者肝為木木旺生風肺為金火旺金刑則生風水冷金寒則又生風脾為土土濕生風燥亦生風心為火火炎風自出腎為水水衰相火生風是為五風八風由外五風由內目為外風所傷其症眵淚腫痛星翳漸侵且風或挾熱則先頭痛眵黏眊臊赤腫羞明風或挾濕則多淚作癢沿爛惡明風或挾燥則眵硬多淚眼皮緊急風或挾寒則時流冷淚微赤羞明若神光泛白視物昏朦漸成內障其痛時作時止此由血虛火旺內風所傷治法在表者散之汗之挾熱涼散之挾寒溫散之濕則汗之燥則潤之但宜兼用和血之品所謂治風先治血血行風自滅也至諸內風所傷切不可升提發散蓋氣血大虧之人邪中於里不能發泄宜大補氣血使邪外越又有平素陰虧者厥陽內動微感傷陰即宜養陰平肝使邪自散若過用風藥益動熱而耗陰矣至半表半裡之症當以和解為先然外風易治內風難除吳鶴皋曰艽防之屬可以治外風而內風非其治也旨哉斯言學者能體會之思過半矣寒素問陰陽應象大論曰北方生寒寒生水至真要大論曰諸寒收引皆屬於腎天元紀大論曰太陽之上寒氣主之蓋運氣自霜降以後春分以前正屬太陽寒水用事設觸冒嚴寒即傷膀胱寒水之經頭疼腰強發熱惡寒因循不治傳變多端上乘空竅發為目病冷淚翳障視物昏花若復兼濕則邪滯太陰胬肉壅腫兼火則刑剋肝陰遂生白障兼風則迎風流淚雲翳滿遮兼痰則睥生櫻核目睛赤澀兼鬱則眼倦慵開氣滯光暗辨症分治庶無遺誤即有一二寒盛熱生外多火象亦宜養陰清熱若過用寒涼遏抑陽氣不免星障凝滯矣然此屬外寒所致若內寒則人身臟腑自有之病素問陰陽應象大論曰陰勝則身寒人生真陽之氣寄於右腎寒則無以作強而技巧不出矣膀胱寒則三焦之氣不化而水道不行矣脾胃寒則不能蒸腐水穀而五味不出矣肝膽寒則將軍無決斷而謀慮不出矣大小腸寒則變化不行而二便閉矣心包寒則神明衰而萬事不能應矣目為五臟之精華稟天陽之真氣若為陰寒所制必至失光昏眊內障遮睛宜溫補氣血以助真陽至真要大論曰治寒以熱又曰熱因寒用又曰諸寒之而熱者取之陰王海藏曰熱之不熱責其無火益火之源以消陰翳參耆桂附即夏月何妨選用不待水冰地坼然後為真寒症也此外又有中寒伏寒挾寒諸症種種不同大抵治法務在調和營衛祛寒散邪而已暑素問刺志論曰脈虛身熱得之傷暑又曰暑為陽邪而東垣治暑則有陰陽動靜之分或廣廈招涼以傷其外或恣食生冷以傷其內此靜而得之為陰暑農人耕耨于田中征夫奔走於道路此動而得之為陽暑陰暑宜溫陽暑宜清趙養葵謂暑病與熱病相似但熱病脈盛暑病脈虛耳蓋傷暑者脈必濡弱或弦細芤遲身體發熱與四時感冒無異惟舌紅口渴小便短赤為辨其分見於五臟者心為火故暑先入心暑傷氣肺主氣故火旺金刑又長夏濕土司令脾惡濕得暑則脾土之施化不行肝腎同位下焦俱有相火肝得暑而龍火以起腎得暑而雷火以升五火併熾勢等燎原上延於目則赤障腫痛眵淚如膿治法或辛涼表散以發其汗或清熱養陰以通利小便務使暑邪外達不致陷伏傷陰若盛暑之時猝然暴中則當以涼解為主惟怯弱之人內無所御外受暑邪則涼解之中必兼輔正如清暑益氣湯之類是也又或暑邪內伏待深秋收藏之際猝然驟發傾刻之間遂至不救甚或刑剋腎陰瞳神傷損凡見此症即宜涼補真陰倘伏藏雖久其發甚緩秋冬之間目赤腫痛亦宜仍用清暑之劑臨症細辨不患治絲之棼也濕素問生氣通天論曰因於濕首如裹至真要大論曰諸濕腫滿皆屬於脾水熱穴論曰腎何以主水腎者至陰也至陰者盛水也肺者太陰也太陰者冬脈也故其本在腎其末在肺王好古曰水者脾肺腎三經所主有五臟六腑十二經之部分上頭面中四肢下腰腳外皮膚中肌肉內筋骨蓋脾胃者土也飲入於胃遊溢精氣下輸於脾脾氣散精上歸於肺肺者土之子也肺氣盛則清肅令行通調水道下輸膀胱而腎者肺之子胃之關也腎氣化則二陰通而三焦者決瀆之官水道出焉肝腎二經之相火遊行於五者之間上承天道之施化下佐地道之生髮與手厥陰心包為表裡以行諸水豈有泛溢停滯之患若脾胃虛弱肺無稟受而氣道不通由是四海閉塞三焦不瀉日久熏蒸郁為濕病然此為內傷之濕若外感之症在天有雨露霜霧之濕在地有沮洳潮瘴之濕飲食有酒漿之濕衣被有汗液之濕陽盛則火旺濕且化熱陰盛則水旺濕又化寒風可祛濕濕更挾風燥可除濕濕還勝燥內因外因隨經觸發上攻頭目症現各殊脾濕則多眼癬眼菌肺濕則多黃膜心經濕則多胬肉如脂肝經濕則多星障黑珠如霧渾濁腎經濕則瞳神呆鈍色淡昏眊無光治法風藥可以勝濕燥藥可以除濕淡藥可以滲濕泄小便可以引濕利大便可以逐濕吐痰涎可以即濕濕而有熱苦寒之劑燥之濕而有寒辛熱之劑燥之至於脾腎俱虛水溢為病則須培土填精標本兼治此東垣脾胃論所以諄諄於後天補救也燥內經論四時主病之原獨遺燥症喻嘉言以秋傷於濕一語正其誤為秋傷於燥而千古疑義晰矣蓋燥為金氣秋時為陽明燥金司令其氣肅殺故草木黃落素問天元紀大論曰陽明之上燥氣主之氣交變大論曰歲金太過燥氣流行又曰諸澀枯涸幹徑皴揭皆屬於燥至真要大論曰諸氣膹郁皆屬於肺喻嘉言謂屬於肺之燥也又曰諸痿喘嘔皆屬於上亦屬於肺之燥也或因蓄熱勝濕而燥金衰津耗而燥或猝感寒邪陽氣鬱於外而燥或恣食生冷陽氣鬱於內而燥或因於濕濕化熱而燥或因於風風勝濕而燥王好古有減氣而枯有減血而枯李時珍曰枯者燥也上燥則渴下燥則結筋燥則強皮燥則揭肉燥則裂骨燥則枯肺燥則痿腎燥則消目之白珠肺也燥則眵干作癢目之黑珠肝也燥則翳障模糊目之瞳子腎也燥則睛光昏眊心為火燥則心陽上浮紅絲系絆脾為土燥則脾陰澀縮黃膜牽遮治法宜養營潤燥補肺清金至於陰分素虧膽汁不充或膽經焦耗則一點神膏涸可立待亟宜滋補真陰使水液自生則光華漸復矣火朱丹溪曰太極動而生陽靜而生陰陽動而變陰動而合生水火木金土各一其性惟火有二曰君火屬心相火屬肝腎素問陰陽應象大論曰壯火散氣少火生氣又病機十九條屬火者五火內陰而外陽主乎動者也故凡動皆屬火人身肺為生水之源腎為盛水之府火性妄行元氣受傷水源易涸逆調論所謂一水不能勝二火者此也又有厥陽臟腑之火根於五志之內六欲七情激之其火隨起故忿怒則火起於肝醉飽則火起於胃房勞則火起於腎悲哀則火起於肺心為君主自焚則死矣解精微論所謂一水不能勝五火者此也有臟腑相移者肝移熱於膽心移熱於小腸之類也有盛衰剋制者心火盛克肺金肝火盛克脾土之類也張子和曰目不因火則不病白輪變赤火乘肺也肉輪赤腫火乘脾也黑水神光被翳火乘肝與腎也赤脈貫目火自盛也此即五志之火由內而生若天行時熱乃外來之邪火有感其令氣者其目紅腫癢痛淚如膿水畏熱羞明舌紅口渴五志之火宜降其虛陽滋其肺腎水旺則火自平外來之火宜升陽以散之苦寒以瀉之火鬱發之之義也其有陽虛陰勝火不歸源目雖赤腫而脈轉軟弱者治宜溫補扶陽王太僕所謂益火之源以消陰翳是也又有水衰火盛心腎不交目光昏眊脈象浮洪者治宜養陰滋水王太僕所謂壯水之主以鎮陽光是也七情總論喜怒憂思悲恐驚是為七情然七情不越五志心在志為喜肝在志為怒脾在志為思肺在志為憂腎在志為恐悲屬心包附於心驚屬膽附於肝此七情之生於五志也心怵惕思慮則傷神脾憂愁不解則傷意肝悲哀慟中則傷魂肺喜樂無極則傷魄腎盛怒不止則傷志恐懼而不解則傷精此五志之傷於七情也怒則氣上喜則氣緩悲則氣消恐則氣下驚則氣亂思則氣結此七情本經之形證也怒傷肝悲勝怒喜傷心恐勝喜思傷脾怒勝思憂傷肺喜勝憂恐傷腎思勝恐此七情相勝之次第也喜與悲憂相反怒與驚恐相反思則無有所反乃土位建極於中州也喜與怒相因悲憂與驚恐相因思則各有所因乃土德寄旺於四時也東垣云治目不理脾胃非其治也其亦有鑑於此歟但目之為病由於六淫者易治由於七情者難治蓋喜太過則腎氣乘矣怒則肝氣乘矣悲則肺氣乘矣恐則脾氣乘矣憂則心氣乘矣一經自具一氣一經又各兼五氣五五二十五氣變化難窮苟不得其要終難獲效然七情中悲傷心胞驚傷膽者間或有之喜傷心憂傷肺者絶少也惟思傷脾恐傷腎怒傷肝者最多誠能存養此心使志意和平精神淡定悲怒不起驚憂不擾則天君泰然百體從令自然勿藥有喜何必乞靈於草根樹皮哉喜素問宣明五氣篇曰精氣並於心則喜陰陽應象大論曰在藏為心在聲為笑在志為喜調經論曰心藏神神有餘則笑不休然樂不可極極則終凶靈樞本神篇曰喜樂者神憚散而不藏又曰肺喜樂無極則傷魄素問天元正紀大論曰少陰所至為語笑五常政大論曰火太過為赫曦赫曦之紀其病笑狂妄河間云笑者猶燔爍太甚而鳴笑之象也蓋喜則氣散心陽大動百脈沸騰所謂暴喜傷陽其病為笑不休為毛革焦為內病為陽氣不收甚則為狂且心火過熾上先刑肺下反克腎金水受傷病必及目經曰心合諸脈五臟生成篇曰諸脈者皆屬於目凡人五臟六腑之精液盡上注於目陽亢陰微炎蒸空竅遂有胬肉攀睛等症其起於大眥者屬心為實火其起於小眥者屬心胞為虛火甚則胬肉雙鬥蝕及神水乃心火克腎所致治以清補為主清則心火不升心陽得靜補則心氣得寧心血不耗或通利小腸使火氣由水道而泄以心與小腸為表裡也或涼解心胞以心胞為心之外廓也至於變端不一又當活治不可執一也怒素問五運行大論曰東方生木木生酸酸生肝肝在志為怒調經論曰肝藏血血有餘則怒宣明五氣篇曰膽為怒以肝膽相為表裡肝氣雖強取決於膽也調經論曰血並於上氣並於下心煩惋善怒以陽為陰勝病及於心也靈樞本神篇曰腎盛怒而不止則傷志繆刺論曰邪客於足少陰之絡令人無過大怒以怒發於陰而侵乎腎也是肝膽心腎四臟皆能病怒所為多陰者多怒亦曰陰出之陽則怒也五常政大論曰木太過曰發生其病怒氣交變大論曰歲木太過風氣流行甚則善怒又曰歲土不及風反大行民病善怒其證餐泄薄厥嘔血胸脅痛氣逆不下喘渴煩心消疸肥氣以及外發癰疽等症況目為肝竅尤易受傷初但昏如霧露中行漸漸空中有黑花久則神光不收膽汁不應則內急外乾睹物成歧種種皆怒之貽戚也蓋怒必因內動而起但動由於內邪每乘之當各從其所動之因而治之因熱而動者治其熱因風而動者治其風因厥逆逼上者則治所厥之邪因陰虛而動者補其陰抑其陽按而收之因陽虛而氣浮上者則補其陽斂其浮遊之氣因五志而動者各安其臟氣以平之因鬱而發者治其所郁之邪開之達之因精血不足者補之不已則求其屬以衰之因勝克而動者從盛衰之氣而補瀉之中氣虛衰而動者補土以安之上焦清明之氣不能主持而動者亦當補中焦之穀氣推而揚之因五臟六腑上注之精氣不足而動者察其何者之虛而補之總以疏肝解鬱為先兼養精液使精盈則氣盛氣盛則神全自然視物明朗但木能剋土胃當其衝肝病則胃病切不可再加勞倦以傷其脾醫者不察以為目病皆熱所致竟以涼藥投之又傷其胃肝胃俱傷真元難復終不免有失明之嘆矣憂素問六節臟象論曰肺者氣之本魄之處也陰陽應象大論曰心之變動為憂靈樞口問篇曰思憂則心系急心系急則氣道約約則不利故太息本臟篇曰心小則易傷以憂蓋憂則傷神故傷心也宣明五氣篇曰精氣並於肝則憂肝勝而侮脾也靈樞本神篇曰脾憂愁而不解則傷意脾主中氣中氣受抑則生意不伸故鬱而為憂是心肺脾肝四臟皆能病憂也戴復庵云七氣致病雖本一氣而所以為氣者隨症而變如憂傷肝肝屬木憂則氣並於肝而脾土受邪憂傷心心屬火憂則氣並於心而肺金受邪憂傷肺肺屬金憂則氣並於肺而肝木受邪凡人憂多則氣機不利胸脅痛憂多則水濕凝滯周身走痛或關節痛遇陰寒則發憂多則熱蓄不散目瞀小便赤憂多則氣虛不能攝涎動則喘憂多則血脈蹇滯四肢無力能食便紅憂多則食物不化噯酸腹滿不能食目之白睛屬於肺肺憂鬱太過則肺氣不舒結成翳障視物模糊復有憂極而悲者傷及心胞之相火有憂極而恐者傷及腎中之真水火不足則光華不能發越於外水不足則膏液不能充滿於中輕則昏眊羞澀重則魚胞鶻眼補肺安神最為要法再令素所親信之人好言慰勸使心陽轉動即喜勝憂之意也思靈樞本神篇曰心有所憶謂之意意之所存謂之志因志而存變謂之思陰陽應象大論曰中央生濕在志為思舉痛論曰思則氣結又曰思則心有所存神有所歸正氣留而不行故氣結矣本神篇曰怵惕思慮則傷神本病篇曰憂愁思慮則傷心蓋心為脾之母母氣不行則病及其子所以心脾皆病于思也張會卿曰思郁者氣結於心而傷於脾也及其既甚則上連肺胃而為咳喘為失血為噎膈為嘔血下連肝腎則為帶濁為崩淋為不月為勞損李東垣曰五臟六腑之精氣皆稟受於脾上貫於目脾者諸陰之首也目者血脈之宗也思慮傷脾則五臟之精氣皆失所司不能歸明於目而有視物羞明眼皮寬縱倒睫拳毛等症或生偷針或生眼疸治宜扶脾補土兼清心陽若初病而氣結凝滯者宜順宜開久病而損及中氣者宜修宜補然以情病者必得願遂而後可釋或以怒勝思亦可暫解如朱丹溪治一思想氣結之女先激之使怒然後與藥復念病雖愈必得喜方已乃紿以夫回病遂不舉豫嘗用此治太湖李姓之婦目竟獲痊即此法也悲痿論曰悲哀太甚則胞絡絶胞絡絶則陽氣內動發則心下崩宣明五氣篇曰精氣並於肺則悲本神篇曰悲哀動中者竭絶而失生又曰肝悲哀動中則傷魂又曰心氣虛則悲調經論曰神不足則悲是肺肝心三臟亦病於悲也又運氣悲皆屬寒水攻心五常政大論曰火不及曰伏明伏明之紀其病昏惑悲忘從水化也又曰太陽司天寒氣下臨心氣上從喜悲數欠至真要大論曰太陽司天寒淫所勝民病善悲時眩僕又曰太陽之復甚則入心善忘善悲夫悲之為情與憂思大異憂思則默然不語如呆如癡悲則哀慟迫切號呼痛哭漸至淚枯眼腫視物無形且悲則心系急肺布葉舉而上焦不通營衛不散熱氣在中熏蒸清道傷及五輪遂有黑花蠅翅魚鱗白陷諸症治宜補其肝脾蓋木為火之母子虛則補母之義也土為火之子補子令母實之義也然必釋其悲則治得其效若婦女性執終歲戚戚雖日用蕪芎香附以升提參朮歸苓以培本是亦揚湯止沸之計而已恐素問陰陽應象大論曰在臟為腎在志為恐宣明五氣篇曰精氣並於腎則恐邪氣臟腑病形篇曰恐懼則傷心神傷則恐也調經論曰血不足則恐本神篇曰肝氣虛則恐以肝為將軍之官肝氣不足則怯而恐也戴人曰肝者敢也驚恐則肝傷矣肝膽實則怒而勇敢虛則怒而不敢也玉機真臟論曰恐則脾氣乘矣以腎虛而脾勝之也宣明五氣篇曰胃為氣逆為噦為恐者以陽明土勝亦傷腎也又運氣善恐皆屬肝木虛五常政大論曰木不及曰委和委和之紀其病淫動注恐是心腎肝脾胃皆主於恐也甚則精卻恐則氣下人目中一點黑瑩乃先天真一之水所化全賴精氣神包裹而能鑑察萬物精卻則不能化氣而瞳神有昏眊之患矣氣下則不能攝精而瞳神有散大之患急宜補養肝腎固其精氣以復神光蓋心以神為主陽為用腎以志為主陰為用陽則氣也火也陰則精也水也水火交為既濟全在陰精上奉以安其神陽氣下臟以定其志不然則神不安於內陽氣散於外志不戢於中陰精走於下水火不交而目未有不病者也驚素問金匱真言論曰東方青色入通於肝其病發為驚駭以肝應東方風木風主震動而連乎膽也氣厥論曰脾移熱於肝則為驚衄陽明脈解篇曰足陽明之脈病惡人與火聞木音則惕然而驚陽明胃脈也胃者土也聞木音而驚者土惡木也又曰陽氣與陰氣相搏水火相惡故惕然而驚也舉痛論曰驚則心無所倚神無所歸心神散失也此肝膽胃心四臟皆病於驚而氣為之亂也又運氣驚有三一肝木不及金來乘之五常政大論曰木不及曰委和委和之紀其發驚駭至真要大論曰陽明之復甚則入肝驚駭筋攣二火邪助心六元紀大論曰少陽所至為驚躁至真要大論曰少陽之勝善驚三寒邪傷心氣交變大論曰歲水太過寒氣流行民病煩心躁悸膽為中正之官五臟六腑皆取決於膽膽主清淨不受濁穢故膽汁上溢則為口苦膽精不足則為目昏眼中一點神膏乃膽中精汁滲潤而成者也能涵養瞳神清瑩澄徹凡人驚者起於猝然心主震動遂傷及膽其症為目睛不轉為瞳神散大為青膜遮掩治宜安神定志使氣之散者得以復聚張子和曰驚者平之平常也使病者聞之習熟見之慣常自然不驚且肝膽相為表裡其色為青故人之受驚者其面色必青也臨症審辨何難施治哉
