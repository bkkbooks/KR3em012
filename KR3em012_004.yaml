body:
  text: 卷四治驗存參高幼先天不足肺腎陰虧肝陽獨盛或時氣上厥逆右目珠大神呆鋭眥微赤宜補肺腎攝納肝陽熟地山藥茯苓萸肉丹皮澤瀉黨參麥冬牛膝丹參鉤藤石決明砂仁又照前方去澤瀉加沙苑蒺藜又丸方六味丸合生脈散加丹參石決明牛膝枸杞菟絲陸幼風鬱化火刑于脾肺兩目雲翳迎風流淚復生眼癬玉竹苡仁茯苓甘草陳皮豨蘞草防風當歸杏仁冬桑葉荷葉蒂又異功合逍遙散加防風桑葉陳左火鬱心脾右目胬肉扳睛兩目翳膜羞明桑白皮地骨皮米仁甘草梢生地木通歸尾赤芍連翹黑山梔竹葉荷葉蒂又黑逍遙散合杞菊加蟬衣吳左風寒之邪鬱於太陽少陽以致右目紅白翳障玉竹生臺術雲苓柴胡陳皮甘草當歸赤芍防風桂枝杏仁吳左邪郁少陽兩目雲翳右目星障當歸焦白朮赤芍茯苓甘草柴胡薄荷蟬衣白蒺藜荷葉燈心汪左因虛寒鬱右目已廢右目雲翳赤障黨參於朮茯苓甘草廣皮炮姜制香附當歸枸杞子蟬衣白豆蔻陳右風邪化火刑剋肝脾兩目沿眶赤爛怕日羞明羌活防風玉竹焦於朮茯苓甘草陳皮當歸黃柏桑葉燈心江右肝腎陰虛兼有鬱熱兩目瑪瑙翳障歸身柴胡生地山藥丹皮茯苓澤瀉菟絲子石決明蟬衣胡左風寒化火刑剋肝脾以致太陽頭痛兩目痛傷星陷胬肉紅腫當歸生臺術赤芍茯苓甘草柴胡桑白皮杏仁桂枝防風蔥頭又四物湯合逍遙散加杏仁桑白皮防風又生六物合杞菊加黑山梔白芷俞左寒邪化火刑剋肝肺右目胬肉赤障雲翳起星玉竹白朮白芍茯苓甘草陳皮炮姜歸身杏仁白豆蔻又行血熟六物加香附枸杞蟬衣又生六味去萸肉加玉竹麥冬香附枸杞歸身龍衣又熟六物加決明子菟絲子枸杞子楊左陰虛兼挾寒邪刑剋肝陰兩目水晶翳障左目起星熟地歸身臺術白芍柴胡茯苓甘草炮姜枸杞子蟬衣張右火邪刑于心肺兩目胬肉雙鬥蘇木紅花當歸川芎生地赤芍桑白皮地骨皮米仁甘草黑山梔丹參王左陰虛火旺兩目雲翳旱蓮草女貞子生地丹皮茯苓澤瀉知母黃柏丹參石斛吳左肝藏血脾統血血虛則熱自生風血少則不能榮筋以致右目眼皮緊急拳毛倒睫又兼氣虛易致外邪不時赤澀玉竹於朮雲苓甘草廣皮枸杞子池菊當歸萆薢鉤藤沈左邪克肝陰左目白翳垂下右目線障羞明熟地歸身川芎炭白芍玉竹甘草蘇木紅花香附蟬衣枸杞子又照前方去蘇木紅花加麥冬戎左精血兩虧又為寒鬱左目不痛而赤翳障遮瞳視物不明熟地歸身川芎炭白芍枸杞子甘菊制香附白蒺藜又歸柴熟六味去萸肉山藥合枸杞加石決明白蒺藜又熟六物加香附枸杞子蟬衣麥冬張左濕熱化火刑于肝腺肺三經致生黃疸兩目雞盲兼有星障後防失明黨參米仁茯苓甘草新會白歸身石決明旱蓮草女貞子又清火導赤散合二至加茵陳車前子又二陳湯加山梔滑石茵陳萆薢車前子澤瀉女貞子野馬料豆乾姜陳左燥火刑金剋木熱傳三焦左目胬肉兩目云膜昏花生地木通甘草竹葉冬桑葉黑芝麻黑山梔甘菊杏仁枸杞葉陳左風寒之邪鬱於太陽少陽以致左目垂簾白障下起三星眼梢傷痕當歸柴胡桂枝白芍甘草炙蒼朮防風山梔杏仁荷葉張左酒濕化火刑于脾肺以致兩目翳膜羞明黨參茯苓甘草米仁新會白杏仁萆薢歸身益智仁雞距子屠左氣血不足邪郁肝脾兩目拳毛倒睫瑪瑙翳障黨參生黃耆生於術陳皮升麻柴胡歸身甘草防風蟬衣沈左濕熱刑于脾胃致生眼疸眼癬生地木通甘草連翹歸尾山梔赤芍黃柏蒼朮蘆根陸左寒濕邪滯太陰兩目胬肉壅腫玉竹焦茅朮茯苓甘草製半夏陳皮蘇葉杏仁桑白皮蔥頭生薑陸右肺腎陰虧水源乾涸右瞳發白左亦淡色此乃失光之症熟地歸身米炒炙草枸杞子鹽水炒菟絲子楮實子桑椹子五味子黨參麥冬野馬料豆又左歸飲合生脈散加菟絲子歸身錢左稟質素弱中年氣血已衰兼之鬱怒傷肝脾肺積有濕熱以致兩目白睛黃膜赤脈瞳光昏暗清濁不分熟地丹皮茯苓澤瀉柴胡枸杞子米仁菟絲子丹參野馬料豆張左風濕合邪鬱於上焦致生赤爛眼癬半夏制陳皮茯苓甘草蒼朮黃柏秦艽連翹米仁枳殼桑葉燈心金右風寒濕三邪鬱於陽明致生眼癬沿眶壅腫蒼朮厚朴陳皮甘草黃芩枳殼半夏杏仁滑石白芷晚蠶沙又異功散合白虎湯加黃芩秦艽石決明晚蠶沙朱左濕熱上壅空竅兩目翳霧視物模糊須防失光生地丹皮茯苓澤瀉萆薢益智仁丹參女貞子黃柏楊右肝腎精血兩虧復因寒邪郁久化火以致右目堆云內障極險之症熟地山藥丹皮茯苓澤瀉肉桂黨參歸身石決明煅枸杞子野馬料豆又左歸飲加肉桂黨參歸身石決明姚左陰虛不足又兼寒濕鬱於脾陰致生黃疸延久失治化火傷於肝腎兩目蟹珠高突視物無形勉力擬方救治豬苓茯苓澤瀉肉桂白朮野馬料豆紅棗又甘露飲加石決明車前子野料豆周左風寒之邪傷於肝腎右目冰障羞明熟地歸身乾薑炙草桂枝白芍柴胡細辛白豆蔻又照前方去細辛加羌活甘草杏仁又熟四物合逍遙散去柴胡薄荷加香附紅花蟬衣沈左肝腎陰虧痰哮氣逆左目雲翳右目星障熟地歸身半夏廣皮雲苓炙草枸杞子丹參白蒺藜席左水虧火旺腎陽不藏兩目黑花朦朦生地山藥丹皮茯苓澤瀉黃柏龜板旱蓮草女貞子丹參蓮肉陸右肝腎精血兩虧少陽少陰兩經復有風邪鬱伏以致頭痛不止恐致失光熟地山藥萸肉丹皮澤瀉歸身柴胡茯苓枸杞子細辛又七味合生脈散加歸身白芍細辛蔣右血崩之後氣血大虧目失滋養以致瞳神散大失光法宜補斂熟地黨參制於術黃氏歸身炙草棗仁茯神桂圓肉五味子麥冬杜仲烏賊骨又左歸飲合生脈散加丹參沈左寒邪化火刑剋肺腎右目平塌已廢左目蟹睛翳障視物不明歸身茯苓焦白朮甘草桂枝白芍制香附石決明菟絲子又熟黑逍遙去柴胡薄荷加石決明菟絲子又行血熟六物加枸杞子蟬衣又香歸熟六味去萸肉加枸杞子菟絲子白蒺藜錢左氣虛體弱兼感風寒痰滯不宣兩目胬肉赤障羞明黃耆防風生臺術玉竹茯苓廣皮甘草半夏炮姜杏仁吳右氣血兩虧厥陰頭痛兼之胃腑受寒又傷肝腎以致左目赤障凝翳下起傷痕慮發蟹睛熟地歸身黨參制於術乾薑炙草制香附石決明砂仁又杞菊熟四物加石決明紅花蟬衣香附汪左外感暑邪內傷冷飲以致兩目白睛胬肉赤障白翳雖勞役道途然舌白脈遲謂之陰暑不可作陽邪治乾薑半夏甘草香薷杏仁廣藿香白蔻殼又行血熟四物合逍遙散去薄荷加蒺藜荊芥沈左病由遺濁傷陰又感暑邪濕熱以致兩目白障滿泛蟹睛高突視物無形姑念遠來勉力擬方救治生地山藥丹皮茯苓澤瀉廣藿青蒿歸身萆薢石決明沙苑蒺藜野料豆又服藥後雖得微光但右目黑珠泛突已廢惟左目瞳光未損尚可保全熟地白芍川芎炭歸身蘇木紅花甲片桃仁菟絲子石決明六一散降香末又照前方去桃仁六一散降香末加香附蟬衣又熟六物加香附紅花蟬衣張左夏季納涼飲冷風寒傷於太陽少陽以致午後如瘧兩目痛傷蟹睛高凸白障滿泛視物少形症已重極勉擬救治柴胡黃芩半夏制甘草桂枝歸身石決明煅又照前方去黃芩加玉竹炮姜又黑逍遙散加桂枝炒白芍石決明青蒿藿香又熟六味合四物去萸肉山藥加香附石決明紅花女貞子又左歸飲去萸肉加玉竹麥冬香附石決明任左暑邪鬱於肝肺兩目赤障羞明往來寒熱當歸赤芍柴胡茯苓薄荷甘草米仁連翹山梔石斛西瓜翠皮沈左風熱爍於肝胃以致兩目眼皮緊急拳毛倒入內生翳霧目角濕爛白芷升麻防風半夏枳殼黃芩石斛甘草鉤藤當歸又杞菊異功散去白朮加米仁當歸石決明宣右陰不和陽心肺鬱熱左目大眥胬肉生地丹皮茯苓澤瀉當歸川芎炭丹參女貞子麥冬黑山梔省頭草又生六味去萸肉山藥加天冬麥冬丹參西洋參黑山梔女貞子姚左陰虛不足肝腎兩虧兼之寒邪包暑刑剋肝陰兩目旋螺翳障視物不明勉擬救治香附制夏枯草熟地歸身白芍肉桂煎湯拌炒玉竹甘草川芎炭紅花廣藿香煨姜燈心又寒暑漸覺分消疼痛略止但旋螺轉甚不能睜視姑再擬方補肝散合左歸飲去萸肉加牛膝歸身又疼痛已息寒邪未散旋螺更盛竭力擬救八珍湯去川芎加枸杞菟絲子炮薑燕窩淡菜又旋螺略散視物稍明金水六君煎加枸杞菟絲燕窩煨姜又行血八珍湯加枸杞子菟絲子桂枝炒白芍又補血湯合熟六物加香附枸杞子蟬衣沈幼幼年氣血未充又兼暑熱傷陰右目內泛已廢左目白珠皺翳雞盲之症生地山藥丹皮茯苓澤瀉歸身青蒿廣藿女貞子石決明煅雞耎肝又杞菊生六味去萸肉加青蒿歸身石決明雞耎肝又杞菊異功散去白朮用山藥加青蒿當歸蘆根雞耎肝胡右陰虛兼燥木挾相火上衝以致厥陰頭痛左目起星左目蟹睛翳障香附制夏枯草生地丹皮茯苓澤瀉女貞子旱蓮草石決明鹽水煮丹參又二至合人參固本加丹參烏賊骨茺蔚子錢左肝腎精血兩虧厥陰頭痛左目失光已廢右目白星繚亂此青盲之症熟地山藥萸肉丹皮茯苓澤瀉五味子歸身菟絲子活磁石醋煅王右氣血不足肺腎陰虧厥陽上熾以致無風流淚目珠疼痛不時心悸耳鳴人參生地熟地天冬麥冬山藥萸肉丹皮茯苓澤瀉丹參燕窩許左形旺氣衰燥邪克於脾肺以致兩目赤障滿睛人參石膏知母麥冬粳米甘草旱蓮草女貞子又二至合異功散去白朮加米仁川貝丹參麥冬又行血生六物合二至加丹參車前子紀左肝腎不足思慮傷脾中氣下陷視物昏花熟地黨參制於術黃耆蜜炙柴胡蜜炙升麻蜜炙陳皮甘草歸身枸杞子徐右三瘧雖止鬱熱未清以致瞳神生翳視物不清制首烏黨參歸身制於術炙草麥冬青蒿女貞子丹參白蒺藜徐左太陽陽明感受風濕左目上下胞壅腫白睛胬肉蒼朮厚朴陳皮甘草豬苓茯苓澤瀉白朮滑石蘇葉錢右太陰風濕以致左目胬肉壅結上下眼胞腫脹水泡鼻瘡蒼朮厚朴陳皮甘草半夏薑製廣藿滑石蘇葉黃芩大腹皮又異功散去白朮用米仁加豨蘞草防風當歸山梔滑石又異功散合三妙加枳殼滑石又六君子湯合左金丸加當歸沈左精血不足肝鬱不舒脾肺兩經復積濕痰以致兩目昏花肢體壅腫氣喘等症制香附砂仁黨參白朮茯苓甘草陳皮製半夏熟地歸身桑螵蛸徐左氣血不足操持過勞中宮不運左目上睥結生梅核後防瘤患黨參焦於朮雲苓甘草歸身川芎炭白芍酒炒熟地穿山甲煨木香顧左氣滯痰凝鬱熱化燥左目上睥結生櫻核兩目午後赤澀半夏制陳皮茯苓杏仁白芥子貝母枳殼冬桑葉黑芝麻柏子仁菊花葉錢左精血不足肝熱上浮以致無風流淚旱蓮草女貞子玉竹天冬麥冬生地熟地冬桑葉黑芝麻丹參汪左脾虛脫力陰虧陽浮以致頭疼目暗視物不明熟地黨參黃耆蜜炙制遠志歸身炙草制於術桂圓肉煨木香茯神棗仁野馬料豆俞左火邪刑于脾胃以致皮翻黏瞼遍身瘡瘍西洋參米仁茯苓甘草石膏知母丹參山梔石斛吳左風濕熱合邪刑于肝胃右目堆云外障面鼻濕瘡石膏知母甘草米仁蒼朮歸尾羚羊角鮮石斛又白虎湯加山梔豨蘞草又生玉女煎加西洋參歸尾穀精草陳右三瘧失調肝腎陰虧兩瞳色淡漸至失光制首烏淡鱉甲黨參麥冬枸杞子菟絲子女貞子五味子黃左肝陰不足厥陽上浮又兼暑熱刑于肝胃致生紅白堆云外障視物模糊旱蓮草女貞子石膏熟地牛膝鹽水炒知母麥冬西洋參丹參又二地六味去萸肉加牛膝女貞子西洋參麥冬趙右風淫化火刑剋肝脾左目胬肉翳障兩目眼皮紅腫疼痛羞明羌活防風柴胡桑白皮歸身赤芍焦於朮茯苓甘草又加味