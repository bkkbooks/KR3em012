救治熟地川芎當歸白芍柴胡茯苓焦於朮甘草防風蘇木紅花煨姜燈心又行血熟六物加炮薑菟絲子香附何左年未弱冠氣血不能充足左目為物所傷青珠已破泛壅高突疼痛不止勉擬救治蘇木紅花熟地川芎炭當歸白芍香附牛膝紫槿皮炮薑炭防風炭䗪蟲又左目黑珠泛突已平十分之九傷痕未退白障未消未識瞳神損否姑再擬方行血熟六物加防風炭香附炭菟絲子牛膝䗪蟲又凝瘀已散珠圓平復白障未退瞳神已損光影全無惟念尚在童年再擬一方望其僥幸行血八珍湯加枸杞子菟絲子徐幼稚年氣血未足又兼風濕鬱於脾肺以致咳嗽氣逆左目紅腫珠突眼淚如膿羌活防風當歸赤芍柴胡茯苓米仁甘草杏仁蔥頭又珠突已平紅腫少退不能睜視異功散去白朮用米仁加豨蘞草防風當歸石決明杏仁黃左精血兩虧酒濕傷於肺腎以致瞳神渾濁視物昏花須防失光旱蓮草女貞子生地山藥丹皮茯苓澤瀉萆薢益智仁丹參雞距子陸左精血兩虧心腎不交相火上炎以致大眥發癢出血宜引火歸源法熟地山藥丹皮茯苓澤瀉萸肉製附子肉桂人參韓左中氣不足眼皮寬縱拳毛倒睫黨參生黃耆生於術歸身陳皮升麻蜜炙柴胡蜜炙甘草蔓荊子錢左濕熱停於脾肺兩目睥內魚子石榴視物羞明當歸石決明玉竹茯苓蒼朮甘草黃柏又魚子石榴已散紅翳未盡補血六君子去參用玉竹加石斛唐右暮年肝腎陰虧水火不能既濟以致瞳神淡色時見火星飛揚視物模糊宜壯水固精交通心腎熟地歸身炙草枸杞子菟絲子五味子桑椹子女貞子丹參龜膠蓮肉羅左體素陰虧精血不足左目為物所傷氣血復虧以致瞳神散大眼皮垂下啓睫無力視物不明竭力擬治少或有效再可商也熟地歸身炙草枸杞子菟絲子五味子楮實子覆盆子人參麥冬黃耆酒炒䗪蟲洋蟲又眼皮稍能睜視瞳神略小惟視物尚覺不明貞元飲合五子加人參黃耆紅花䗪蟲又生脈散合五子加熟地歸身阿膠孔左視白為黃視紅為紫視正為橫睜目頭暈此陰極陽飛之症生地熟地山藥萸肉丹皮茯苓澤瀉肉桂菟絲子丹參又金匱腎氣丸以丸作湯合生脈散加丹參又十全大補湯姚左精血素虧濕邪復傳肺腎以致兩目白睛黃膜瞳神昏暗夜視不明雀盲之症生地熟地天冬麥冬茵陳黃芩枳殼石斛甘草枇杷葉旱蓮草女貞子丹參又人參固本合二至加丹參茵陳黃芩又夜視得明濕熱已退大半惟內熱尚未盡除二地六味去萸肉合二至加牛膝車前子丹參野馬料豆徐左暮年肝腎陰虧三陰三陽脈息歇止又兼脾胃衰弱不能健運以致兩目眼皮紅赤翻出視物不清熟地人參黃耆蜜炙制於術茯神制遠志棗仁歸身煨木香龍眼肉炙草龜膠鹿角膠枸杞子炮姜楊幼脾胃濕火左目下睥生菌蘇木紅花生地當歸川芎炭赤芍蒼朮厚朴陳皮甘草蘆根又眼菌已消紅翳未盡照前方去蘇木紅花石斛黑山梔
