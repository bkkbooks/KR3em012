body:
  text: 前跋九竅之病惟目為最重苟有誤治其失明者無論矣即神膏未損遇善手極力挽救已不免微云點綴滓穢太清良可恨也古人所以另立專科俾得精通一藝不至於多歧亡羊奈今世之業是科者每以發散攻伐為用其貽禍可勝言哉吾師顧養吾夫子獨窺靈蘭之祕旨辨症酌方投無不效是以名震南北遠近爭赴無虛日僑寓松郡以來積案盈千纍萬今年春先生懼其多而散失集其已驗者若干症編為二卷更著六淫外感七情內傷雜病兼症等論併發明五臟六腑主病無微不抉無義不搜誠眼科之指南抑醫林之圭臬也其立法詳見於治目總論中至於用方則宗景嶽用藥則守之才足見與古為徒心源印合然巧運神思獨抒己見豈末學所能測識乎昔倪微德原機啓微一書立齋薛氏奉為至寶刻入二十四種內其治法亦以補益為主與東垣之脾胃丹溪之滋陰後先一轍故附案甚多外此諸大家於眼目一症皆有條論莫不寒熱虛實並陳補瀉溫涼互用惟張子和自患目疾有人以針刺出血而愈遂宗血實破之之法創為謬論一變而為鉤割再變而為炮烙受其害者殆不可勝數近時張飛疇能以金針撥障頃刻奏功詳見於張氏醫通洵為神妙世有傳其術者爭羡慕之然撥愈者固多撥傷者亦復不少總非善治先生綜核前賢之要旨先究本原次詳臟腑後及經絡按脈論症宜其能使昏然者昭然而眊焉者亦得了焉也憶乙丑秋季偶罹目患歷醫數人過服散風清火之劑幾至歸於長夜賴先生力得留一隙之明仍硯耕筆織然棘圍久困無志功名間嘗窺探醫籍以圖濟人自濟計亦兩得來從先生遊授以此編口講指畫不啻當頭棒喝因請付梓以公同志俾天下之誤於所治者日置案頭按症索方庶不至一誤再誤而貽誤無窮矣寧非斯民之大幸事哉嘉慶十有二年歲次丁卯仲冬朔後二日平湖受業門人殳芬鬱芳氏百拜跋
