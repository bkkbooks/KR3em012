front:
  text: 朱序天下之目瞽於病者半瞽於醫者亦半醫者自瞽其心而欲不瞽天下人之目勢必不能餘二十年中走南北數千里見醫者千百輩醫目者亦百十輩其能起沉疴療痼疾曾不得數人焉而因噎廢食者遂創目不醫不瞎之説嗚呼是説起而天下之目胥受其禍矣然亦由不善治目者之有以禍之也桐鄉顧養吾先生憫天下之且受其禍而不能遍為之救乃出生平所學參以古大家之論著為銀海指南四卷辨輪廓所以明經絡也戒鉤割所以養精血也至於七情六淫分致疾之原五臟六腑表主病之象辨脈辨舌不厭其詳用藥用方貴充其類可兼症患病情之變存醫案準治法之宜可謂大無不包細無不入已前年冬余以先大夫憂旋里獲讀先生書知先生之學固不僅以治目名也憶乾隆庚戌間伯兄遘目疾逾半載手足復腫痛不能運動諸醫以溫涼補瀉之藥輕投之兩目幾瞽而余疾不少衰逮後先生至笑謂先大夫曰是濕熱壅滯所致療之至易如其法而患痊蓋先生之於醫無不通而治目其緒餘耳先生與先大夫為莫逆交余少時習聞先生教略通素問靈樞之義今海內莫不宗仰先生得是書以廣其傳庶幾言醫者不致瞽其心而天下之人亦不致瞽其目也是為序嘉慶己巳冬世愚侄海鹽朱方增拜撰張序靈樞大惑論曰五臟六腑之精氣皆上注於目而為之精目貴乎湛然常清也自外有六淫內有七情病之及於目者多矣倘治之不善或至貽害終身者有之僕嘗見業是科者或竊取數方或合成點藥便懸輪廓圖詡詡然自矜為專科至問其病之所以然則茫乎不知其所自來噫是盲醫也尚可以治目乎哉桐鄉養吾顧先生以眼科名於時人之患目者遠近爭趨之僕習聞病目者曰吾之目賴先生而存或又曰吾之目微先生幾廢竊疑先生醫目如是之神必有不傳之祕獨得之奇故能超絶恆流取譽當世今觀先生之論與所著之案始知先生之學於凡六淫之感七情之傷必先有以徹乎其源而後施以補瀉溫涼之劑以故投無不利病無不起然則先生之於醫不尚異不矜奇只於受病之源看得透耳醫師之良孰逾於是是即以先生之學治他病亦何所往而不宜耶今乃以眼科名是亦未以足儘先生也然以眼科名亦見先生之全力盡在於眼科矣茲本其救世之心出此指南示人俾治目者不至誤於他歧或補或瀉或補瀉兼行各得其道於以復其光明之體豈非斯世之人一大快乎哉是為序嘉慶十有四年歲次己巳孟夏之月海昌張起鱗拜撰
