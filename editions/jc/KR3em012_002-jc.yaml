body:
  text: 卷二瞳神論五輪八廓既詳哉言之矣是為目之體未及目之用也若夫靈明默運鑑萬物察秋毫則有瞳神在焉華元化曰目形類丸瞳神居中而向前猶日月之麗東南而晦西北也目有神膏神水神光真血真氣真精皆滋目之源液也神膏者目內包涵膏液此膏由膽中滲潤精汁積而成者故能涵養瞳神衰則有損神水者由三焦發源先天真一之氣所化目中潤澤之水是也水衰則有火勝燥爆之患水竭則有目輪大小之疾耗澀則有昏眊之患虧者多而盈者少故世無全精之目也神光者源於命門通於膽發於心火之用事也火衰則有昏暝之患火炎則有焚燎之殃故衰宜補炎宜降心君主也通於大眥故大眥赤者實火也命門為小心小心相火也代君行令通於小眥小眥赤者虛火也若君主拱默則相火自然清寧矣真血者即肝中升運滋目注絡之血也此血非比肌肉間流行之血也即天一所生之水故謂之真也真氣者目之經絡中往來生用之氣乃先天真一發生之元陽也真精者乃先天元氣所化之精汁起於腎施於膽而後及瞳神也凡此數者一有所損目難治矣大概目圓而長外有堅殼數重中則青胞內包黑稠神膏一函膏外則白稠神水水以滋膏水外則皆血血以滋水膏中一點黑瑩是腎膽所聚之精華惟此一點燭照鑑觀空闊無窮是為人身之至寶天地之靈光或曰瞳神水也氣也血也膏也曰非也非水非氣非血非膏乃先天之氣所生後天之氣所成陰陽之蘊妙水火之精華血養水水養膏膏養瞳神氣運用神維持喻以日月理固有然而午前則小午後則大亦隨陰陽之運用也大抵目竅於肝源於腎用於心運於肺藏於脾有大有小有圓有長亦由稟受之異也夫男子右目不如左目精華女子左目不如右目光彩此各得陰陽氣分之正也云間謝東田先生精通醫理嘗謂余曰治目以瞳神為本瞳神不損雖翳障滿布不難逐時消退瞳神若損縱極挽救亦屬徒勞無益故著此論以明其關係甚重不可視為泛常爾時互相參究深受其益今東田已入仙鄉余亦桑榆日暮捉筆追思曷勝寒鳥戀群之概心經主病心為君主總統臟腑故憂思勞怒皆動心神心應南方火色目之大眥屬心心受火刑則眥肉壅突而痛若不痛而癢屬虛或因操勞過度或因水虧不能制火所致小眥屬心胞又屬少陽經多氣少血故小眥胬肉屬血虛火爍之故也若心經火邪盛而刑肺為大眥胬肉攀睛屬實火不痛而癢屬虛火小眥胬肉攀睛乃虛火刑金為虧症胬肉雙鬥屬水虧血少火邪刑肺甚則蝕及神水乃心火克腎水也大眥流血腫痛為實火心統諸經之血火盛則血熱妄行故流血不腫痛而癢為虛火乃心腎不交君火炎甚也左目為陰右目為陽陰屬血陽屬氣男多患左女多患右雖有是分不可執一惟在圓機通變也肺經主病肺為華蓋百脈之宗白睛紅絲滿布乃肺熱也白珠胬肉紫脹甚則眼眶青黯乃血為邪乘凝而不行也玉粒侵睛肺氣凝滯所致白睛起膜狀如魚泡寒鬱太陰也白翳侵睛屬金來剋木目珠壅腫紅痛辨是何邪分別施治目珠突出鼻塞咳嗽乃風寒乘肺肺氣逆也珠大脫眶肺腎氣衝乃金水兩虧症也能仰視不能俯視氣有餘而血不足也能俯視不能仰視陰有餘而陽不足也雞盲者陰氣未升則昏至人定後仍能見物雀盲者通夜不見乃肝血少肺陰虧也鶻眼凝睛者陰陽不和火剋金也總之其位至高統一身之氣其見症多在於氣輪隨症審察用藥自能奏效肝經主病肝屬風木木能生火惟血涵養否則火盛血傷目病生焉其臟主疏泄凡人憤悶不平或受六淫之邪則氣不宣流遂生星翳障霧如點如鑿或圓或方形色不一莫可枚舉凡自上而下屬太陽經名垂簾紅色而痛屬肝熱腫痛屬風邪不痛為血虛內熱白色而腫痛屬氣虛挾風痛而不腫為寒邪不腫不痛乃氣虛下陷也自下而上屬足陽明胃經名堆云又名黃膜上衝在黑珠內者名內堆云屬肝腎不足木挾相火上升在黑珠外者名外堆云腫痛涕淚為風克肝胃障色帶黃為濕熱腫痛畏寒淚如膿水屬寒邪胬肉壅結障色微紅屬胃火此皆氣血失充虛中挾邪症也紅白相間名瑪瑙障屬熱鬱肝經氣血相混也純白而厚名水晶障屬寒乘肝陰也白星團聚名聚星障屬肝腎鬱結精血受傷也一線垂下名線障橫住瞳神名橫關初起紅痛屬風寒邪郁肝陰不能發越不紅痛屬肝腎陰虛相火上炎也一線盤旋於風輪之上名旋螺障一為陰寒上乘一為邪鬱於肝陰也黑珠內瞳神外初起如霧漸漸厚大名內障左關脈細澀屬肝鬱不舒左尺脈洪數屬腎氣不納也色白而長形如半月名半月障屬肝經鬱怒所致色白而厚名白障稍薄名白翳最薄名白霧白點名星紅腫癢痛屬風紅腫不癢痛屬郁邪舌白涕淚屬寒眼眵乾硬羞明惡熱屬火乾澀昏朦屬燥此皆實症若不腫而紅痛屬血虛肝熱生風不紅腫而痛屬憂思鬱怒肝氣不舒不紅不痛屬陰虛火熾皆虛症也目珠疼痛肝陽上浮也白障滿布赤脈貫睛屬肝經鬱熱若無白障但見赤脈貫睛者心火刑肺肝也黑珠上一顆突出名蟹珠發於瞳神巔頂屬肝腎兩經發於瞳神下面屬陽明發於大眥旁者屬太陽發於小眥旁者屬少陽凡胬肉壅腫涕淚脈弦細為風舌白脈遲為寒舌紅脈數為火脈細弱或數而無力屬陰虛此症由邪襲肝陰氣血不能流行或精血不足過服寒涼升散而發黑珠低陷名陷障障凝如冰名冰障屬邪乘肝陰氣血受傷紅腫脈浮弦為風不紅腫脈遲細為寒乃實中挾虛症也腫痛胬肉黑珠泛白名內泛乃精血大虧風寒邪郁也此皆舉其大略須脈象舌色兼參庶幾無誤脾經主病脾為諸陰之首統攝一身之血在氣為中氣在臟為心子目之上睥屬脾下睥屬胃上睥內生紅粒名魚子石榴生紅塊名雞冠蜆肉皆屬風熱邪滯太陰氣血凝結所致睥生痰核在皮裡膜外如櫻如梅由於氣滯燥結防有成疣之患睛明穴有瘡名眼癰日久成管名漏睛屬太陽鬱熱不宣睥翻黏瞼屬陽明胃火上睥生肉粒名偷針下睥生肉粒名眼癉腫痛屬風鬱化火不腫痛而時發時止屬勞傷心脾肝木剋土是虛症也上睥寬縱拳毛倒睫紅腫屬脾肺氣虛挾風不紅痛屬中氣下陷下睥緊急拳毛倒入屬肝風克胃下睥內生菌屬陽明濕火兩睥生癬濕爛為風焦枯為火乾澀屬燥膿窠屬濕然有風中兼燥火中兼風濕中兼熱諸症宜細辨之腎經主病腎為作強之官伎巧出焉應北方癸水涵木製火榮養血脈瞳神內起星邪郁腎陰也五星繚亂視物𥉂𥉂水為火反克虛實皆有也瞳神細小火搏水陰也瞳神散大氣不裹精也瞳神發白水源乾涸所致黑珠滿紅名胭脂內障屬相火上浮水不能制若瞳神亦紅名血灌瞳神不治瞳神泛白動躍已成內障亦不治瞳神黃色如金火亢水竭亦不治有見火星飛揚者心腎不交也有見螢星滿目者肝腎不和也有見白星繞亂者肺腎氣虛也有見黑花茫茫者腎陽不藏也視白為黃視紅為紫視正為橫視定反動睜目頭暈此陰極陽飛症也瞳神不大不小其色不白不紅三光俱滅真青盲也法在不治以上諸條皆精血失充之症誠以水為天一所生務宜滋養水足精充目疾自痊愈矣三焦主病三焦分上中下目疾是上焦病無有論及中下者然細按之則三焦各有見症不可混治頭痛鼻塞耳聤面瘡目紅腫痛唇瘡口糜此皆上焦病也治宜清火發散疏肝養目肚腹膨脹胸膈不舒兩目乾澀或沿爛此乃中焦病也治宜消積行氣腳氣壅腫步履艱難水道不通濕熱上浮以致目患此乃下焦病也治宜利濕清熱舒筋腑病以通為補故但敘實症其有虛症另見各門學者細心參之可也小腸主病小腸為火府與心經配合表裡凡心經之火上延於目者兼責諸小腸故古人治心火必用導赤以心為君火無直折之理但當通理小腸則心火自降此治臟先治腑之法也膽經主病膽屬少陽經曰十二經皆取決於膽為半表半裡兩邊頭痛法用小柴胡及逍遙散乃和解之劑目中神光惟賴膽中清純之氣所養倘膽精不足膽汁不充兩目必昏古方俱以諸膽為治所以清其邪熱乃同氣相求之理也然味太苦寒防其礙胃總宜以條達為主余詳肝經胃經主病胃為水穀之海轉輸旋運生化不窮故治病先講胃氣胃氣一弱飲食不納何以能勝藥力乎然胃病有虛有實有熱有寒實宜硝黃之屬虛宜術草之屬寒宜香砂之類熱宜芩斛之類配合脾經為後天生養之基故東垣專主脾胃立論非虛說也其見症詳載脾經但須知陽土不耐溫燥方不誤治大腸主病大腸傳導糟粕通調為順溏泄則有陰傷之患秘結則有陽亢之虞昔人治便頻無度多以補脾為主亦扶土生金之義也有火則閉塞不通須用攻下之品釜底抽薪誠妙法也稍涉虛者如景岳濟川煎亦可採用凡目病在肺經者治其大腸以其表裡相應所謂上病治下也膀胱主病膀胱為巨陽其經脈最長統束一身凡外感症皆太陽受之羌防發汗治其經五苓利水治其腑更有濕熱下注二便不調專治膀胱其病自愈與腎為表裡腎無瀉法瀉膀胱即所以瀉腎溝瀆既清水泉不竭腎精自然充足目珠上屬太陽見症甚多如頭風損目垂簾成障皆是故凡治目不可不細究膀胱也雜病總論病之發也有因外感內傷前已詳論之矣至於雜症不過氣血痰食鬱五者而已然五者之中惟氣血為甚蓋人有陰陽即為氣血陽主氣故氣全則神旺陰主血故血盛則形強然而身形之中有營氣有衛氣凡人受氣於谷谷入於胃以傳於肺五臟六腑皆得受氣清者為營濁者為衛營行脈中衛行脈外其所以統攝一身環流不息者全賴元氣為之主持元氣者先天之氣命門之主也衛氣者後天之氣生命之原也元氣為衛氣之母母能益子子賴穀氣之津以養生故元氣衰則營衛之氣皆有不充矣夫血生於心統於脾藏於肝布於肺泄於腎灌溉一身為七竅之靈四肢之用潤顏色充營衛津液得以通行二便得以調暢然血為氣化亦能助氣故一氣一血相為表裡也痰飲一症內經止有積飲之說本無痰症之名蓋痰涎之化本由中氣衰弱水穀入胃不能盡化留而為痰使脾強胃健則隨食隨化皆成津液焉能成痰故肥人多痰者因中氣不能健運所致經云形盛氣虛此之謂也若實痰者或因風因熱因濕因寒鬱結於臟腑經絡之間血氣不能通達凝而為痰祛其外感而痰自消也內經之不言痰者正以痰必因病而生非病之因痰而致也經云人以水穀為本人絕水穀則死脈無胃氣亦死又曰谷盛氣盛谷虛氣虛此其常也反此者病蓋五味入口臟受於胃遊溢精氣散布於五臟酸入肝苦入心甘入脾辛入肺鹹入腎此五臟各歸所喜也凡人偶食生冷油濁之物積滯於腸胃之間此邪氣之實也若食入即脹或胸脅作痛者乃中氣不旺之故也蓋脾胃為倉廩之官職司化食脾胃強壯者即滯亦易化如其不能化者皆由脾胃之虛也郁病者滯而不通之義也經言五郁者乃五行之化氣運有乖則五郁之病生焉滑氏曰木性本條達火性本發揚土性本沖和金性本肅清水性本流通五者一有所郁斯失其性矣至於情志之郁不過憂思怒三者而已蓋憂則氣聚思則氣結怒則氣逆也初病宜順宜開若郁久則傷及中宮神志日消心脾日耗非補不可也余謂痰食鬱三者總由氣血不調之故若氣血和平則神魂安靜膚腠固密外來之邪無隙可乘內生之郁無由而起即使寒溫不測世事無常或外犯客邪或內為郁病只宜祛其外感調其鬱氣則安矣寧有大病之足慮哉氣病論經云氣脫者目不明氣者清陽之氣也清陽不升則濁陰不降而目安能燭照無遺乎人在天地間莫非氣化之流行臟腑經絡氣得其正何用不臧氣失其正何往弗害故曰百病生於氣也又近見應震王氏曰行醫不識氣治病從何拒堪笑道中人未到知音處旨哉斯言是實治身治病第一大綱蓋氣之為用無所不至一有不調無所不病為虛為實為寒為熱變態莫可名狀氣有不調之處即病根所在之處也明者撮而調之猶如解結一舉手而即脫然矣故本乎天者天之氣也本乎地者地之氣也人身之氣亦應之陽氣有餘為目赤壅腫陰氣有餘為隱澀羞明中氣不足為眼皮寬縱凝而不行為脾生癭核實者破之虛者補之滯者行之郁者達之寒者溫之熱者涼之不和者調之疏之凡五行五志五臟六腑皆賴氣以為之用常則安變則病是以聖人謂諸病皆因於氣而況目病乎故醫者當參觀互證酌宜而治之庶於斯道無愧矣血病論經曰目得血而能視血者氣之所化也故血盛則形強人生所賴惟斯而已潤經絡澤臟腑養筋骨充滿一身而目受其蔭固宜流通而不宜瘀滯者也然人之初生必從精始精之與血似乎非類而丹家曰涕唾汗津精液血七般靈物盡為陰則凡屬水類皆天一地六所化而血即精之類也但精藏於腎所蘊不多苟房勞太過精虧則血亦虧而七竅不靈矣夫血本陰類其動者皆由於火或外邪不解而火鬱於經或縱飲不節而火動於胃遂使血熱妄行致成目赤眥瘍治法以涼血清火為主或壅瘀於經絡則睛珠脹悶或鬱結於睥眥則胬肉堆突或乘風熱則發椒瘡粟瘡之類總以行血散血為治若痛傷痕陷白障滿泛等症皆屬血虛邪乘所致治宜行血補血為先蓋太陽經起於目內眥血多氣少少陽經起於目銳眥血少氣多陽明經起於目之兩旁交額之中氣血俱多惟厥陰連於目系而已故血太過者太陽陽明之實也血不及者厥陰少陽之虛也能辨過與不及庶攻補皆得宜矣以是知血化於氣而又為精類陽虛不能生血所以血宜溫而不宜寒陽亢最能傷陰所以血宜靜而不宜動察於此而得其養營之道則目光如炬又何血病之足虞哉痰病論經曰濕氣變物水飲內蓄中滿不食是言飲也非言痰也痰之與飲雖曰同類而實有不同也蓋飲為水液之屬凡嘔吐清水及胸腹膨脹吞酸噯腐等症此皆水穀之餘停積不行是即所謂飲也若痰之不同乎飲者飲清澈而痰稠濁飲惟水穀停積而化痰則五臟之傷皆能致之然究其原痰即人之津液無非水穀所化但化得其正則形體強營衛充若化失其正則臟腑病津液敗而血氣即化為痰矣後人治痰開口便言痰火有云怪症為痰者有云痰為百病之母者痰之為害不綦重乎然則虛實之間尤不可不辨惟驗其年力猶盛血氣未傷或以肥甘過度或以濕熱盛行或風寒外閉皮毛或逆氣內連肝膈皆能生痰動火害及於目惟察其病氣形氣俱屬有餘者即實痰也實痰則宜消伐若年及中衰形氣羸弱或以多病或以勞倦或以憂思酒色致成勞損非風卒厥者或脈見細數臟無陽邪時為嘔惡泄瀉氣短聲喑者皆有目暗不明之患但察其形氣病氣本無有餘者即虛痰也虛痰則宜扶助元氣使精血充旺則痰自消矣然痰之所生無不由乎脾腎脾惡濕濕勝則為痰腎屬水水泛亦為痰脾家之痰有虛有實腎家之痰則無非虛耳痰病延及於目治最棘手惟調其寒熱虛實氣血陰陽則無有不愈昔王隱君謂內外百病皆生於痰悉以滾痰丸攻之其亦但顧目前而不知後患者也食病論經曰飲食勞倦即傷脾飲食自倍腸胃乃傷脾胃為倉廩之官大腸為傳導之官食傷則氣滯氣滯則上不能散布精華下不能轉輸糟粕然有傷於寒物者有傷於熱物者其在內傷不過為瀉為痢而已若在眼目則傷於寒者兩胞腫脹治宜溫消傷於熱者目赤癢痛治宜清利若過食煎炒炙煿必至火氣上攻則為雞冠蜆肉或魚子石榴變症不一治宜清利腸胃去其積熱而諸病悉除此症之易治者凡在少年童稚最多此症惟年老久病之人脾虛不能運化或不能食或知飢少食或食入即脹明是中虛之象當以補法行之諒明哲者不至於膠柱而鼓瑟也郁病論經曰木鬱達之火鬱發之土鬱奪之金鬱泄之水鬱折之言乎五氣之郁也人之臟腑應之木應肝膽木主風邪畏其鬱結故宜達之火應心與小腸火主熱邪畏其陷伏故宜發之土應脾胃土主濕邪畏其壅滯故宜奪之金應肺與大腸金主燥邪畏其躁急故宜泄之水應腎與膀胱水主寒邪畏其凝溢故宜折之然五者之中皆可通融圓活不必拘泥夫人氣血不順脈不和平即是鬱症乃因病而鬱也至若情志之郁則有三焉一曰怒郁方其盛氣凌人面赤聲厲多見腹脹及其怒後逆氣已平中氣受傷多見脹滿疼痛倦怠少食之症一曰思郁凡芸窗秀士茅店羈人以及室女尼姑心有所憶而生意意有所屬而生思思有未遂而成郁結於心者必傷於脾及其既甚上連肺胃為咳喘失血隔噎嘔吐下連肝腎為帶濁崩淋不月勞損一曰憂鬱或因衣食之累或因利害之牽終日攢眉而致郁者志意乖違神情蕭索心脾漸至耗傷氣血日消飲食日少肌肉日削遂至發為目症前七情論中已詳之矣故不贅述然五氣之郁因病而鬱者也情志之郁因鬱而病者也凡患是症者宜自為節制皆非草木所能奏效所謂妙藥難醫心上病也可不慎之兼症總論醫雖有專科而病則無專病也有專科則其術精無專病則其症雜吾故論目病而及於兼症焉夫病之重者莫如傷寒仲景論太陽篇中頭熱目赤陽明篇中目中不了了睛不和少陽篇中少陽中風兩耳無所聞目赤是傷寒兼目疾也若夫中風頭風虛勞臌脹噎隔咳嗽黃疸遺濁疝瘕痎瘧瀉痢以及外科瘡瘍女科胎產經帶兒科痘疹疳積皆有兼目疾者不得不一一著明仿傷寒析義之例以垂諸簡編庶有成法可遵而不至於顧此失彼也至於頭風之害目疳積之害目患者極多為本科之本病故論之尤詳切焉夫醫有十三科傷寒為第一余科次之眼科又次之今以眼科而括諸科之全者因慮業是科者守一家之說而不能廣搜醫籍倘遇兼症則曰此某科也望望然去之寧不貽識者之笑乎然欲概為療治使患目之人併入於光明之域必須博考諸家臨症乃能措手也古人立法互有不同有偏於寒者有偏於熱者有偏於攻者有偏於補者熟究深思化其偏而得其全則法皆盡善矣故專者專心之謂也又專力之謂也專其心專其力斯得專其藝矣且能專者未有不能兼者也因專而後能兼因兼而後愈專成德之士豈一端一節所能盡其長哉傷寒兼目疾論傷寒有傳經直中傳經者由太陽傳陽明由陽明傳少陽由少陽傳太陰由太陰傳少陰由少陰傳厥陰此循經傳也有太陽不傳陽明而經傳少陽者有陽明不傳少陽而徑入本府者有少陽不傳太陰而徑歸胃府者謂之越經傳有傳一二經而止者有始終只在一經者在表為寒在裡則為熱矣直中者不由三陽傳入而徑中三陰有寒無熱者也若兼目疾惟三陽有之太陽宜汗陽明宜清少陽宜和無異法也羌活主太陽葛根主陽明柴胡主少陽為報使之藥人所共知而溫經散寒之法間亦參用至於分症立法無關於本科者不必贅述也瘟疫兼目疾論溫疫之邪伏於膜原蒸變不測吳又可製為達原飲以治之立論超出千古舉世皆宗之然其症發熱頭疼便閉神昏與外感風寒相似不可不細辨也夫風寒從外入內病無臭氣觸人間有作臭氣者必待傳陽明胃府始見若瘟疫從中達外病即有臭氣觸人輕則透於床帳重則盈於房帷此氣之易辨也風寒主收斂面色多繃急而光潔瘟疫主蒸散散則緩面色多鬆緩而垢晦此色之易辨也風寒初起舌多無胎即有白胎亦薄而滑瘟疫一見頭痛發熱舌上即有白胎且厚而不滑或粗如積粉或色兼微黃此舌之易辨也瘟疫之脈傳變後與風寒頗同初起時與風寒迥別風寒在表一二日脈多浮或兼緊兼緩兼洪而皆浮迨傳入里始不見浮脈瘟疫從中道而變一二日脈多沉迨自里出表脈始不沉乃不浮不沉而數或兼弦兼大而皆不浮此脈之易辨也且其見症必初起忽覺凜凜以後但熱而不惡寒以其從內蒸發非必有感觸之因也設有脅痛耳聾則邪溢少陽腰背項痛則邪溢太陽眉稜骨痛眼眶痛鼻乾不眠則邪溢陽明當以柴胡羌活葛根等分經加用若舌根先黃漸至中央邪漸入胃此三消飲症若脈長洪而數大汗多渴此邪適離膜原欲表未表此白虎湯症若舌上純黃色或變黑色或生芒刺或鼻如煙煤或大便不行或大便雖無結糞而脈象沉實此皆承氣湯症倘耽延失下以致循衣摸床撮空理線攻不可補不可惟有用陶氏黃龍湯間有得生者至於養營清燥總宜在驅邪之後也若邪火上攻於目赤腫疼痛畏熱羞明宜專逐疫邪則目自愈亦有晝夜壯熱目中如火燃如針刺怕見日光燈光必須四面遮圍始稍寧靜亦宜注意逐邪使胃中無熱邪留郁自然清光大來又有疫邪傳裡遺熱下焦小便不利邪無輸泄經氣鬱滯目黃如金者即以茵陳湯治之或邪火久焰腎水枯涸瞳神昏渺眵淚失光逐邪之中兼用滋陰不得徒以甘菊蒺藜療之總之瘟疫乃時氣傳染治宜清火散邪東垣普濟消毒飲本為瘟疫而設以治瘟疫之目疾其奏效不更速乎中風兼目疾論中風分中臟中腑中血脈中府者中在表也即傷寒論太陽中風桂枝湯之類是也外見六經形症無異傷寒治法亦同中臟者中在裡也中心不語中脾唇緩中肺鼻塞中肝目瞀中腎耳聾而有閉與脫之分閉者兩手握固牙關緊急藥宜疏通開竅熱閉牛黃丸冷閉橘半薑汁湯脫者口張心絕眼合肝絕手撒脾絕聲如鼾肺絕遺尿腎絕更有髮直搖頭面赤如妝汗出如珠此際須用理中湯加參兩餘以溫補元氣或寒痰阻塞用三生飲加參灌之庶救十中之一中血脈者中在半表半裡也如口眼歪斜半身不遂之屬是也藥宜和解以大秦艽湯加竹瀝薑汁鉤藤主之氣虛者偏於右佐以四君血虛者偏於左佐以四物氣血俱虛者左右俱病佐以八珍若兼目疾治法亦不外此惟宜養血除風所謂治風先治血血行風自滅也他如中肝之目瞀脾絕之眼合皆垂絕之候並非目病不可救也頭風兼目疾論頭為諸陽之首目為七竅之宗一身之經脈皆上接於首而少陰厥陰少陽太陽之脈皆出於目系若風邪乘之則為頭痛故曰頭風然有大小雷頭風左右偏頭風以及陽邪風陰邪風之殊然究其原不過六經頭痛而已自有表症可察蓋身必寒熱脈必緊數或涕淚鼻塞或咳嗽項強或背脊痠疼按定何經用藥各有所主若太陽頭痛羌活藁本主之陽明頭痛升麻葛根主之若陽明胃火上衝直達頭維而痛者宜白虎湯主之少陽頭痛柴胡川芎主之太陰頭痛防風白芷主之少陰頭痛獨活細辛主之厥陰頭痛蔓荊子吳茱萸主之此六經報使之藥若雷頭風者乃滿頭作痛麵皮疙瘩宜清震湯主之右偏頭痛者宜補氣散風左偏頭痛者宜養血除風此治外風之大略也若內風發動有陰陽氣血之辨陰虛者乃水虧於下而虛火乘之則痛陽虛者乃陽衰陰勝遇寒則痛氣虛者微遇外邪或勞頓則痛血虛者以肝藏血脾統血血虛則熱自生風眩運耳鳴此所謂肝風內動也故氣虛者人參黃耆為主血虛者當歸川芎為主陰虛火浮者壯水為主陽虛陰勝者扶陽為主若三陽之火上熾夜間作痛者宜補肝散主之更有痰厥頭痛者有風痰濕痰寒痰腎虛水泛為痰諸症風痰者宜散風祛痰濕痰者宜燥濕消痰寒痰者宜溫胃補氣氣不逆則痰自平矣水泛為痰者宜養陰補腎使腎中水火和平無有偏勝則痰自愈也凡頭風之症最易損目者蓋風邪上受必犯空竅肝開竅於目為風木之臟木動則生風以風招風內外合邪故頭風必害目也或為旋螺泛起或為蟹睛高凸或為內外堆云或為紅白垂簾或為瞳神散大或為內障青盲此等症候皆宜各隨其經考之脈象臨證應變不可執法而治也虛勞兼目疾論虛勞之受病惟房勞傷思郁傷醫藥傷三者而已其見症也骨蒸咳嗽吐血泄瀉男子失精女子不月五者皆本病之常房勞傷者斷喪太過而精氣受傷也其症從下而上由腎肝而至於脾或先失血或見遺精次見咳嗽骨蒸等症真陽虧者乏氣少食後見泄瀉而危真陰虧者火旺血瘀必發癰腫而斃思郁傷者情志不遂而神氣受傷也此病起於腎關於心而迫肺傷肝及脾再交水火謂之七傳初起骨蒸乾咳繼則亡血失精女子不月至死而面色不衰以陰火蒸騰津液於上所以肢體日削而神采愈鮮也最為難治醫藥傷者表邪未清留於肺絡誤服寒涼清降邪必從皮毛陷入亦有因寒涼傷胃胃輸寒氣於肺皆能令人咳嗽不休或風熱誤投辛散而傷少陰之經必先吐膿血而後泄瀉或汗下失於調養而傷其營衛必先微寒數熱而後咳嗽若兼目疾房勞傷者治以六味八味為主思郁傷者治以逍遙歸脾為主醫藥傷者治以調補元氣為主然在初起之時尚可圖救延至末傳終難取效慎之慎之鼓脹兼目疾論鼓脹當辨明虛實寒熱然後施治方不錯誤假如溺赤便閉脈數有力色紫暗氣粗厲口渴飲冷唇焦舌燥所謂諸腹腫大皆屬於熱是也溺清便溏脈遲無力色㿠白氣短促喜飲熱湯舌潤口和所謂諸病水液澄澈清冷皆屬於寒是也按之不痛時脹時減者為虛按之愈痛腹脹不減者為實東垣治法枳朮補中二方出入加減隨症取效此症痰濕素盛中氣先傷或為血蠱或為水腫見症不一或宜開鬼門或宜潔淨府或宜除陳莝前人論之甚詳所謂上下分消其勢也如有兼目疾者未有不兩胞腫脹眵淚赤澀須察其本病之由而以照顧脾胃為主蓋土敗則木賊木能生火火又生風眉睫之間變端不測矣若新感時邪天行赤熱只以常法治之不必過慮也咳嗽兼目疾論咳嗽者一由於胃氣不清一由於陰火上乘五臟六腑雖皆有咳而大要不越聚於胃關於肺六字而已何者胃為臟腑之總司肺為諸咳之門戶也外感咳嗽有風從皮毛而入於肺者有從背俞而入於肺者有素患咳嗽復加風寒及形寒飲冷所致者一表即清故為輕症不比雜病積久而發急難取效也然風熱風燥最當辨明如冬時先傷其節之暖復加風寒外遏而致咳嗽痰結咽腫身重自汗脈浮者風熱也宜用萎蕤湯慎不可用辛熱發汗燥為秋氣令不獨行長夏濕土之餘氣既伏藏於肺胃之間至深秋燥令大行與濕不能相容至於挾風寒之威而成咳嗽者風燥也惟千金麥門冬湯五味子湯為宜蓋肺燥胃濕兩難分解故斂散互用燥潤雜出也若兼目疾風熱則赤痛風燥則澀癢氣逆則睛脹痰凝則視昏治如上法至於火炎乾咳悉是陰虛大抵腎水枯竭肝臟多火故及於目只宜壯水制陽如六味加麥冬五味子之類堪稱善治若導火之法斷斷不可用也更有形寒飲冷傷於肺胃連及脾臟咳嗽多痰目胞浮腫氣輪紅赤宜桂枝人參湯枳實理中湯四逆加人參湯等治之不明乎此而誤用寒涼之藥鮮不為害矣黃疸兼目疾論黃疸病以濕得之故口渴難治不渴易治其症有陰有陽由於濕之有寒有熱陽黃者濕從火化瘀熱在裡膽熱液泄與胃之濁氣共並上不得越下不得泄熏蒸郁遏面部先黃次及身體指甲汗溺俱黃黃如橘子色陽主明治在胃陰黃者濕從寒水脾陽不能化熱膽液為濕所阻浸淫肌肉溢於皮膚色如熏黃陰主晦治在脾傷寒發黃金匱黃疸立名雖異治法則同再瘀熱入胃有因食谷者有因酣酒者有因色欲者上盛則一身盡熱下鬱則小便為難食滯宜消之酒熱宜清之女勞穢濁始宜解毒繼則滑竅濕在上以辛散以風勝濕在下以苦泄以淡滲各有方法可按症以求之也若寒濕在裡惟羅謙甫茵陳四逆湯最有卓識誠足補仲景之未備者也然無論寒濕濕熱其目皆黃甚至瞳神亦黃勢必雲霧翳障瞻視昏花治亦無他法以茵陳為主五苓四逆隨症選用黃雖分陰陽實陽多陰少也故葉天士曰夏秋疸病濕熱氣蒸而成堪為明徵而徐靈胎疸囊之說濫誇其方不肯示人苟有濟世之心何忍珍而不露哉遺濁兼目疾論遺濁本二症遺是遺精濁是濁帶遺分有夢無夢濁分赤色白色有夢而遺者相火之強也無夢而遺者心腎之衰也濁而赤色者血虛熱甚也濁而白色者氣虛濕熱也然遺精症狀各有不同大抵小便後流出不可禁者為濕熱下注不小便而自出者為精關滑脫或莖中痛癢常欲如小便者為敗精阻滯凡人酒色過度思慮無窮致真元衰憊虛火流行每多患此又濁帶症狀各有不同大約以干掩竅端者為火不幹掩者為濕小水赤澀而痛或濁有赤色者為小腸濕熱小水不赤不痛而所下色白或滲利轉甚者為脾氣下陷莖中癢痛而發寒熱或有結痛者為毒邪所侵丹溪謂胃中濁痰滲入膀胱未足以盡之也設有是症而兼目疾遺是精病腎之虛也宜貞元五子飲之類濁是氣病膀胱不化也宜通關五苓散之類其目眵淚赤腫濕熱相火也宜萆薢分清飲或翳霧羞明者脾腎兩虧也宜脾腎雙補丸或瞳神淡白者乃真精走盡元氣大虧不可為矣惟宜大劑填補希冀百中之一也痎瘧兼目疾論痎者瘧之總名也瘧者病之暴瘧也經曰夏傷於暑秋必痎瘧蓋暑熱傷陰暑必挾濕濕與熱並不瀉則痢不痢則瘧也又曰陰陽相搏而瘧作陰搏陽而為寒陽搏陰而為熱如二人相爭此勝則彼負彼勝則此負陰陽互相勝負故寒熱並作也大抵無痰不成瘧外感四氣內傷七情飲食飢飽房室勞倦皆能致之而其中氣凝滯鼓動痰涎則一也三陽為淺三陰為深太陽之瘧腰背頭項俱疼先寒後熱熱止汗出陽明之瘧鼻乾舌燥寒甚乃熱熱甚汗出喜見日光少陽之瘧口苦脅痛而嘔寒熱往來身體解㑊少陰之瘧寒少熱多嘔吐獨甚舌乾口燥欲閉戶牖而處太陰之瘧慘然太息腹滿惡食病至善嘔嘔已乃衰厥陰之瘧腰痛少腹滿小便數而不利恐懼不足腹中悒悒若有兼目疾者當分經專治暑者清之濕者燥之風者散之虛者補之調其寒熱治以溫涼其治本病之方仲景小柴胡湯出入加減洵為至當不易毋忽視也瀉痢兼目疾論瀉痢乃脾胃之疾六氣中除燥氣外皆能為瀉然傷於寒濕者為多其邪從經絡而入犯及中土所以治瀉以補脾為君除邪為輔若中氣下陷泄瀉無常者宜補中歸脾主之乃正治也五更腎瀉古人皆用四神丸未必皆驗蓋因濕傷水臟故也當用金匱澤瀉湯加薑桂五味萆薢之類往往獲效又有肝腎大虛命門火衰不能蒸化糟粕而時見泄瀉者宜附子理中湯或右歸丸加紫石英粟殼之類以固斂之痢疾多患於夏秋之間當初起正值暑濕全盛時用通利之劑即愈蓋積滯亦是腸中津液氣不統運變為敗垢調其氣則失統之敗垢自下未傷之津液亦安近世執痛隨利減之說概用通利久痢虛痢則危矣郭友三治一人陰虛發熱下痢不食用豬苓湯阿膠黃連湯而痊可謂善悟瀉症若兼目疾卻不可過用祛風利濕惟宜健脾如異功散之類隨症加減痢症若兼目疾宜行血調氣如香蘇平胃四物或佐香連丸清寧丸皆可若瀉痢久而目生翳障者乃陰分受傷也法宜滋陰甘草阿膠可隨症加入總之津液下泄不能上承於目延久必有翳膜之患當去其宿積固其腸胃標本兼施瀉痢得止則目患自除矣瘡瘍兼目疾論瘡瘍者六陽火燥有餘水不能制以致妄亂無拘燔灼於經絡之間蒸逼於肌膚之內氣血為之壅滯日積月累而毒成矣陽毒必高凸紅赤焮腫治之易愈陰毒必低凹青黑平塌治最難痊或發於頭面或發於手足或發於身體其名不一其狀各殊治之之法諸家皆有條論選粹諸書可考也其妙在用藥升降得宜及藥貼之道地內服湯劑不過排膿消腫而已外科諸症大約熱者多寒者少火性上炎目竅至高最易衝犯目為肝竅肝屬於木又為火之從生同類相應自然之理而肝與膽又為表裡膽腑清淨瘡毒為濁邪挾其火勢擾害少陽苟其平素肝腎有虧陰虛血少膽汁不充安能滋其目絡故熱邪乘虛而入發出目患若發於病毒之時須用三黃四物專治其毒毒愈而目亦愈若發於病毒之後治用解毒涼血之類熱退而目亦得愈至於椒瘡粟瘡眼癉眼癬之症為本科自有之病不可與瘡瘍同語也胎產兼目疾論胎前產後症亦繁多大法胎前以安胎為第一義產後以行血為第一義然安胎之藥不專恃芩術也形盛氣實胎常不運者非香砂耗之不安血虛火旺腹常急痛者非芎歸養之不安體肥痰盛嘔逆眩運者非芩半豁之不安或因風寒外傷而胎不安者桂枝湯香蘇飲皆宜此安胎之要訣若兼目疾治法亦不外此惟氣虛不運者發在右目翳障羞明宜補氣和中如四君子加香砂之類是也血虛不能滋養肝木化火生風者發在左目星翳胬肉宜補血清熱如四物湯加黃芩之類是也若風寒外感發為目病而兼妊娠宜解散之中兼和血調氣如蘇梗枳殼芎歸之類皆可參用也產後有三沖三急三禁三沖者瘀血之沖肺衝心沖胃也三急者新產之嘔吐泄瀉多汗也三禁者禁佛手散以川芎能發汗也禁四物湯以地黃能作瀉也禁小柴胡湯以黃芩能阻惡露也若兼目疾因氣血大虧不能裹精而為瞳神散大宜急補氣血固斂精膏或因去血過多木失所養而為翳霧羞明宜養血平肝有哭泣悲傷而為拳毛倒睫者有邪乘空竅而為沿爛流淚者皆氣血不足所致治宜護肝養血蓋產後肝膽發生之氣甚弱而血液衰少必須調護培養務在早治莫待病根深入為終身之患也經帶兼目疾論經者經脈也血隨氣行周身旋轉應月而下不失其常故即謂之經水帶者帶脈也環束如帶管攝諸經失其所司時流穢濁故即謂之帶下女科首重調經其人心脾充旺則經候如常蓋脾輸五穀之津液歸於心入於脈變赤而為血血有餘則注於衝任而為經水苟心脾衰弱便有參差不月之虞血虛者後期而至血熱者先期而來陰氣勝陽則血不運行故令乍少陽氣勝陰則血流散溢故令乍多憂思過度則氣結氣結則血亦結鬱怒過度則氣逆氣逆則血亦逆氣血結逆於臟腑經絡之間而經閉不通矣又有經前誤食冷物遏抑陽明之路阻其血脈每次經來必先腹中作痛或筋骨痠疼經後風寒乘虛客於胞門傷其衝任所生之血不能宣流而下斷續淋漓或成塊作片此皆當察其虛實而治之也經閉不調皆有目患蓋目為血脈之宗血不足則脾臟失職不能歸明於目而且肝木無制必然化火生風為星翳霧障甚則挾相火上行刑剋水源為瞳神淡白經水逆行而上目中清純之膏為濁陰擾亂或為瘀血灌睛或為胭脂內障先賢治法氣虛陰勝者四君子主之氣滯者四君加香附延胡索調之血虛陽勝兼熱者四物加芩連丹皮清之血實有瘀者四物加桃仁紅花破之憂思者歸脾湯補之鬱怒者加味逍遙散佐以越鞠丸達之經來脹痛者當歸抑氣散行之風寒內客者當歸養榮湯加薤白以溫之散之帶之為病五臟六腑皆有之產寶云帶下三十六疾分十二症九痛七害五傷然總而論之不過虛實二字故後人只以赤白言之凡風寒濕熱客於胞門傳至臟腑結於帶脈津液因之湧溢而出必辨其色赤者為熱白者為寒青者為風黃者為濕內經言白蠱白液白淫皆主任脈為病治宜專固任脈若因脾虛中氣下陷不能統固宜補中升陽或因心腎不交相火蒸爍膏液宜交通心腎若兼目疾因於風寒濕熱者必翳障羞明因於脾虛心腎不交者必午後乾澀甚則瞳神昏暗皆由津液暗耗無以滋榮總宜閉其精竅開其水道庶清濁得分更兼用補其氣血和其陰陽氣血旺則客邪無隙可乘陰陽和則水火得以既濟矣痘疹兼目疾論小兒痘瘡皆由父母交媾之時淫火熾甚而得所謂先天之毒稟於有生之初者也蓋痘本先天淫毒伏藏於肝腎之內觸四時不正之氣浡然發泄氣領血載達於肌膚之外良由衛氣運於脈外營血行於脈中氣能祛毒外出血能載毒上行凡原氣之強盛者不滿旬日成痂而愈矣若元氣羸弱氣血偏虛寒熱偏勝毒不能盡達肌表遺留而上逆則目中生痘損壞瞳神又或成漿之後毒出肌膚內臟之元氣已虛藥餌之補益不濟有餘之毒不能出外反深入於內因而目中星遮翳蔽變症不一惟驗其靨之白色者屬於氣虛淡紅者屬於血虛紫色者屬於餘毒未清若過期而靨不脫者乃氣血大虧之象調其寒熱溫涼益其偏虛血氣則目明翳消而得愈矣疹者痘之末疾發於脾肺二經內應手足太陰感天地間沴戾之氣故名疹也然名各有異蘇松謂之痧子浙江謂之瘄子湖廣呼為麻子北直謂之疹子山陝謂之膚瘡曰糠瘡曰赤瘡名雖不同其症則一總由君相二火燔灼太陰脾肺受之故其為症必噴嚏咳嗽面腫頰紅目胞腫脹眼淚汪汪惟氣旺邪淺者易治邪盛正虛不勝其毒則危機立至更有愈後餘熱未清上乘空竅肝木受克則黑珠星障昏花羞明涕淚切忌酸寒伐胃宜清養肺陰補其氣血若誤認為風設以表散猶之抱薪救火矣五疳兼目疾論小兒五疳者肝疳心疳脾疳肺疳腎疳也其說創於錢氏皆因臟腑柔弱氣血未充或病後失調或飲食飢飽致傷脾胃而成疳症津液內亡虛火妄動傷於何臟發為何病形症各殊肝疳者一名風疳白膜遮睛瀉血而瘦心疳者兩眥紅障面黃頰赤脾疳者一名肥疳上胞腫脹腹大嗜甘肺疳者一名氣疳白珠縐翳喘嗽氣促腎疳者一名骨疳瞳神凹凸喜臥濕地五臟治法繁多不能概述大要不離乎補脾健運則清濁自分中土有權生機日盛以異功散為君隨症加減如枸杞白芍以補肝山藥阿膠以補肺歸身棗仁以補心黃耆紅棗以補脾熟地菟絲以補腎使脾胃稍旺陰血漸充繼進地黃湯以養陰收功豈非善治夫疳者干也皆由內熱熏蒸消爍津液然不可因其熱而用苦寒之藥再困脾陽重傷胃氣世俗呼為疳積謂疳必兼積概用消導不知疳乃虛症補之尚恐不及而妄行攻伐安有愈期乎又有蟲疳者其蟲如絲出於頭項腹背之間黃白赤者易治青黑者難治蛔疳者眉縐多啼嘔吐清沫脊疳者拍背有聲脊骨如龜腦疳者頭皮光急腦熱如火其症雖多不出於五臟宜以前法治之然五疳之中心腎二疳甚少肝脾肺三疳常常有之蟲疳者余亦屢見也姑舉其要以備後學者留意焉辨脈法脈要精微論曰微妙在脈不可不察邪氣臟腑病形篇曰按其脈知其病命曰神秦越人六十一難曰切脈而知之謂之巧許叔微曰脈之理幽而難明吾意所解口莫能宣也凡可以筆墨載可以口舌言者皆跡象也至於神理非心領神會烏能盡其元微方盛衰論曰受師不卒使術不明不察從逆是為妄行推雌失雄棄陰附陽不知併合診故不明甚矣脈之不可不辨也其大要當合素問靈樞及各家論說熟讀而玩繹之自能領悟惟常變之理不可不知凡人之脈有素大素小偏陰偏陽者此其賦自先天各成一局也邪變之脈有倏緩倏疾乍進乍退此其病之驟至脈隨氣見也故診脈者必須先識臟脈而後可以察病脈先識常脈而後可以察變脈然有脈病相符者有脈病相左者有病亢極而脈忽反變者如陽證見陽脈陰症見陰脈此脈病相符也證似陽而脈不鼓指證似陰而脈鼓盛者此脈病相左也陽盛者脈必洪大至陽盛之極而脈反伏匿陽極似陰也陰盛者脈必微細至陰盛而脈反躁疾陰極似陽也此病亢極而脈忽反變也又有從合之辨如脈浮為表治宜汗之此其常也而亦有宜下者仲景云若脈浮大心下梗有熱屬臟者攻之不令發汗是也脈沉為里治宜下之此其常也而亦有宜汗者少陰病始得之反發熱脈沉者麻黃附子細辛湯微汗之是也脈促為陽當用葛根黃芩清之矣若脈促厥冷為虛脫矣非溫不可此又非促為陽盛之脈也脈遲為寒當用附子乾薑溫之矣若陽明脈遲不惡寒身體濈濈汗出則用大承氣湯此又非遲為陰寒之脈也是皆從證不從脈也至於表症汗之此其常也仲景曰病發熱頭痛脈反沉身體疼痛當救其里用四逆湯此從脈之沉也里症下之此其常也日晡發熱者屬陽明脈浮虛者宜發汗用桂枝湯此從脈之浮也結胸症當以大小陷胸下之矣脈浮大者不可下下之則死是宜從脈而治其表也身疼痛者當以桂枝麻黃解之矣然尺中遲者不可汗以營血不足故也是宜從脈而調其營矣此皆從脈不從症也世有切脈而不問症問症而忽脈者得非仲景之罪人乎陶節庵曰問病以知其外察脈以知其內全在治法二字乃臨症切脈之要訣也余歷來治目無不詳參脈證以定治法如陸某朱某同一胬肉壅腫黑珠內泛一則脈沉遲知其陰虛不足復感寒邪故余用六物湯加炮姜以養陰溫胃一則脈浮遲而細知其氣血兩虧寒而兼風故余用四物逍遙加蘇木紅花以祛風理血張某艾某同一珠大脫眶也一則兩尺浮洪無根右寸濡弱無力此肺金不能生水腎火浮越所致故余用金匱腎氣丸以降其浮陽一則兩尺細數右寸浮洪此腎水枯涸肺氣上衝所致故余用人參固本煎加牛膝以清其亢熱此證同脈異而治亦異也又如錢某瞳神散大李某兩目眥肉突出發癢判然兩症然二人尺脈均細數寸脈均洪大皆由於心腎不交故余同以滋陰六味丸去萸肉加女貞子以治之此證異脈同故治亦同也至如孔某視白為黃視紅為紫視正為橫乃陰極陽飛之症脈宜浮洪今反細澀所謂過極者反兼勝已之化也余以七味二地溫補之此憑症而不憑脈也大抵陰陽虛實最宜詳審張介賓曰凡值疑似難明處必須用四診之法詳問其由兼辨其聲色但於本末先後中徵之以理斯得其真若不察此而但謂一診可憑信手亂治亦豈知脈症最多真假見有不確安能無誤且常診者知之猶易初診者決之甚難此四診之所以不可忽也辨舌法經曰能合色脈可以萬全舌尤色之易見者昔張仲景著傷寒論及金匱要略皆詳舌胎後人傷寒舌鑑脈理正義皆本此而推廣之惟杜清碧驗證舌法尤為簡明蓋舌為心竅臟腑有病必見之於舌目病本於臟腑故宜合舌胎以辨之惟外感有之而內傷絕少凡症初起舌有白胎薄而淡者是寒邪初入太陽也白屑滿舌邪將傳入陽明也白胎乾厚者此太陽熱病也白胎兼滑者此太陽陽明並病也白胎而中有微黃者此太陽之邪漸入陽明也如表未罷雙解之表已罷下之如作瀉清之導之白胎而尖微有刺者此少陽陽明也白胎而中有黑點者亦少陽陽明也如表未罷者和解之表已罷微下之白胎而滿黑刺者此三陽合病也白胎在左陽明虛熱也白胎在右少陽受邪也白胎而膩滑者痰也舌無白胎外症厥冷者寒中少陰也白胎或左或右而余見黃黑外證下利痛引小腹者臟結也熱甚者下之無熱者溫之白胎在尖紅者少陽也舌胎根白而尖者太陽少陽並病也舌白無胎而明淡外症熱者胃虛也凡舌無胎垢而色變者皆屬虛也白胎厚如積粉者此瘟疫初犯膜原也白胎而尖根俱黑乃金水太過火土氣絕於內雖無凶證亦必死也白胎中見黑色兩條乃太陽少陽之邪入於胃因土氣衰絕故胸中結痛也白胎中見灰色兩條乃夾冷食舌也舌見微黃胎者邪入陽明裡熱症也次見深黃者熱漸甚也再見干黃焦黃者熱愈亢也宜下之舌胎根黃而尖白者表少里多也黃胎而滑者陽明濕熱也黃胎而上有隔瓣者邪毒甚深急下之黃胎雙垂夾見者正陽陽明也黃胎而中有斑者將發斑也無斑者專下之黃胎而中有刺者胃熱甚也黃胎而中有小黑點者邪將入臟也急下之黃胎久而變黑乾燥生刺者實熱亢極之候不治者多若遇此症必須掘開舌胎視瓣底紅者可急下之瓣底黑者不治舌胎中心黑厚而乾者為熱盛津枯之候舌中黑無胎而燥津液受傷虛火用事也舌黑有津邊紅證見譫語者虛人攻補兼用之壯實者急下之夏月中暍多有此舌以辛涼解之間有大虛之候須合脈症參之中黑邊白而滑者表裡俱虛寒也凡舌胎純黑者有兩症一為火極似水一為水來剋火其辨法火亢盛者胎厚而多刺水來克者胎薄而無刺若舌黑中爛者不治舌至乾黑而短者不治產後舌紫黑者不治凡見黑色須問曾食酸物及甜咸物否以其能染成黑色非因病而生故潤而不燥刮之即退也若舌胎見灰色即黑色之輕者與黑同治亦有陰陽之分如直中陰經者即時舌變灰黑而無積胎如傳經熱症則灰黑干胎大抵舌上黃白黑俱有胎紅紫則有色而無胎也舌見純紅者乃火亢之極瘟疫將深之象也舌中心見紅者此太陽症也舌紅而尖起紫泡者此心經熱毒也舌紅而中見紫斑者將發斑也舌淡紅而中見紅赤點者將發黃也舌紅而碎裂如人字紋者此陽明傳熱於少陰心也舌淡紅而碎裂如川字紋者此心經積熱也舌紅而有刺者此胃有熱積也舌紅而內有黑紋數條者乃陰毒結於肝經肝主筋故舌見筋絲也舌紅而有重舌者此熱毒入心胞舌紅而脹大滿口此熱毒入於少陽陽明均宜刺出惡血舌紅而出血如衄此熱傷心胞也宜涼血止血舌紅而硬強失音者死候也有痰者導之內實者下之間有生者舌紅而碎爛如蟲蝕者此少陰瘟毒也下之舌紅而吐弄者此熱在心脾也舌紅而戰動難言舌紅而痿軟不能言者皆心脾虛極也多用人參可救舌紅而乾癟者死不治舌見純紫色者此酒毒也舌紫而中心帶白者酒毒在少陽也舌紫而中心帶赤者酒毒在陽明也舌淡紅而中見紫黑筋數道者此厥陰真寒症也據此論治可以辨虛實別死生矣用方法漢張仲景治傷寒立一百十三方此用方之祖也其中增減分合立法最善如桂枝湯加葛根則為桂枝加葛根湯此增法也桂枝湯去芍藥則為桂枝去芍藥湯此減法也桂枝湯去芍藥加附子此增減並用法也桂枝二麻黃一湯桂枝二越婢一湯此合法也桂枝麻黃各半湯此合而兼分之法也蓋病情百變方難膠一故有一方之中寒熱並用仲景附子瀉心湯是也攻補並用陶氏黃龍湯是也若藥性相反而兼用者胡洽治痰癖十棗湯加甘草丹溪治勞瘵蓮心飲與芫花同行是也又如丹溪治一婦用四物湯去川芎倍地黃加白朮黃耆黃柏甘草人參一帖腹大泄目無視口無言知其病勢深而藥無反佐之功也仍用前藥炒熟與之而愈此同一方而一生一熟相懸天壤也至於君臣佐使尤不可不知如六君子專補氣故以人參為君四物湯專補血故以當歸為君切不可凌亂雜用致昧要領欲為醫者能先明制方之法無難奏效余治汪婦兩目赤腫左關脈沉數而微澀此鬱火傷肝症宜用逍遙散然時值暑令恐柴胡復升動其火因去之加青蒿而病除又治謝某火旺水虧宜用六味丸但目有星障不宜酸斂因去萸肉加女貞而病除又治謝某兩目𥉂𥉂紅絲下墜此由操勞過度思慮傷脾以致脾火刑金宜用歸脾湯但脾中尚有鬱火恐木香太燥且能破氣因去之加麥冬以潤肺而病除又治吳某厥陰頭痛氣血素虧脾腎兩經復感受寒邪致左目凝翳赤障下起傷痕宜用溫補之劑但僅祛脾臟之寒則水不得溫僅祛腎臟之寒則土不得暖余以理中湯理陰煎合治之而病除凡茲各法未可概述但能隨證應變自免刻舟求劍之弊若症有相似方無參用如陰症似陽者其人目腫面赤煩躁咽痛身有微熱大便秘結有似陽症但渴欲飲水復不能飲切其脈沉細遲微或輕按洪數重按沉弱無力此乃水極似火王太僕所謂身熱脈數按之不鼓擊者名陰盛格陽非熱也宜用通脈四逆湯倍加附子人參以接其真陽之氣設投寒涼下咽即斃陽證似陰者其人目微赤身寒逆冷神氣昏昏狀若陰證然渴能飲水大便硬秘小便赤澀設有稀糞利出者乃旁流之物非冷利也其脈雖沉切之必滑數有力王太僕所謂病人身寒厥冷其脈滑數按之鼓擊者名陽盛格陰非寒也輕者白虎湯重者承氣湯倘投溫熱醫殺之也又有隔治一法如六節臟象論曰未至而至此為太過則薄所不勝而乘所勝也張介賓謂凡五行之氣克我者為所不勝我克者為所勝假如木氣有餘金不能制而木反侮金薄所不勝也余嘗治一目痛脾泄嘔吐之證專用四君子而愈蓋此症由脾土衰弱不能生金制木時值春令少陽用事金氣休囚木挾相火反刑肺金故致目痛嘔吐復克脾土故致泄瀉若從伐肝木木必不能受制惟用隔治一法補土以生金生金以制木則金有生扶木不能薄所不勝也此即東垣補土平肝之意也但天下之病無窮古人之方不能盡其變態則因證立方當抒獨見曾有干某某目為石灰所傷黑珠已損視物不明兩眶腫痛又有瘳婦左目為火烙傷黑珠已壞疼痛難忍此兩症如飛鴻集龍木論銀海精微原機啟微審視瑤函等書及各大家集中均所未載余思石本屬陽又因火化灰其性更烈目為所傷則血凝水涸遂處一方以韭菜地上蚯蚓泥煎湯令服其腫痛立消繼以涼血之劑目遂還光蓋蚓本土德而星應軫水味性鹹寒最能清熱其泥尤甘寒瀉熱解毒必用韭菜地上者韭入血分而行氣氣血行則腫消熱毒清則痛止也至火性燥烈烙目尤酷遂用陳菜子油令其灌洗其腫痛亦立消蓋菜子辛溫無毒陳則辛溫之氣稍泄目方苦燥得此潤之痛可少減且味帶辛溫則能散其凝滯而腫亦消矣學者能細認病源熟諳本草何患症之難治哉用藥法夫病有虛實寒熱之殊故藥有補瀉溫涼之別若虛中挾實實中挾虛寒因熱化熱因寒化上寒下熱上熱下寒其症種種不同則臨證用藥之法不可不知昔韓懋之嫂口舌唇皆瘡或至封喉下部虛脫白帶如注醫或投涼劑解其上則下部疾愈甚或投熱劑及以湯藥熏蒸其下則熱暈欲絕懋曰此亡陽症也以鹽煮附子為君制以薄荷防風佐以薑桂芎歸水煎後入井冰冷與之未盡劑即少瘥或問其故曰真對真假對假上乃假熱故以假冷之藥從之下乃真寒故以真熱之藥反之斯上下和而病解矣此治假熱真寒之法也張銳治蔡魯公孫婦產後次日大泄而喉閉不入食眾醫曰二疾若冰炭雖司命無如之何張曰無憂也取藥數十粒使吞之咽喉即通下泄亦止魯公奇之張曰此於經無所載特以意處之曏者所用藥乃附子理中丸裹以紫雪耳方喉閉不通非至寒之藥不為用既下咽則消釋無餘其得至腹中者附子力也故一服而兩疾愈此寒熱並治之法也羅謙甫治一婦肝脾鬱結午前用補中益氣湯下六味丸午後用逍遙散下歸脾湯此氣血並治之法也謙甫又治一婦肝脾氣滯與歸脾湯下蘆薈丸此補瀉兼施之法也薛新甫治一婦怒氣傷肝氣血俱虛朝用逍遙散夕用歸脾湯又治一婦鬱怒傷肝脾朝用歸脾湯夕用逍遙散蓋一則肝陰大損故先用逍遙以達木性次用歸脾以補其土使木不能剋制一則脾土既為肝木所克故先用歸脾以扶衰敵強次用逍遙以疏其氣使木性得暢土不復克此治標治本先後次序之法也李東垣治息賁伏梁諸丸初令服二丸一日加一丸二日加二丸加至大便微溏為度再從二丸加服周而復始俟積消大半而止蓋恐病淺藥深轉傷正氣故必逐漸增添此由少加多之法也李士材制陰陽二積之劑補中數日然後攻伐不問積去多少再與補中待其神旺則復攻之屢攻屢補以平為期此攻補迭用之法也餘本各法以治目疾應手輒效嘗治沈某目紅壅腫眵淚如膿口乾唇燥小便赤澀此一水不能勝五火也第降其火則水不即生第滋其水則火不遽息乃以六味作湯下青寧丸火清而水亦壯又姚某右目為苗葉刺傷白障滿泛疼痛不止當以活血為本治氣為標乃朝用四物湯加蘇木紅花乳香沒藥䗪蟲以行其血夕用沉香越鞠丸以通其氣又幹某痘後兩睥生癬此因虛鬱熱停滯脾胃當以扶脾為本清熱為標乃朝用六君子去甘草加升麻望月砂杏仁以健脾潤肺夕用清目散以瀉火又李某兩目赤障晝則時痛時止此陽不和也乃朝用香砂六君子以和其陽然上焦鬱氣未通再用搐鼻碧雲散以達其氣又馬某兩目赤翳夜則時痛時止此陰不和也余用補肝散合四物湯以和其陰然浮火上升不可不降再用熟地附子搗爛塗湧泉穴以降其浮游之火又劉某兩目昏眊胸膈鬱悶無事生怒此腎水不能生肝木也余用左歸飲下越鞠丸則壯水之中兼解其鬱丹此陰陽互濟氣血並調虛實兼治諸法不能遍舉略述數條以待學者隅反或曰何不合一湯以治之余曰不然用藥之法同於用兵譬如兩枝兵合路而來則合師以剿自可奏功若東一支兵西一支兵分路來犯若合師以剿東馳西走力不能專何如分師進取各奏成功然而奇正相生各存乎人總期變通盡利故兵法曰多算勝者少算不勝也
