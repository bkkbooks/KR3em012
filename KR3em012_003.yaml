body:
  text: 卷三湯丸備要六味地黃丸仲陽治肝腎不足真陰虧損精血枯竭憔悴羸弱腰痛足酸自汗盜汗水泛為痰發熱咳嗽頭運目眩耳鳴耳聾遺精便血消渴淋瀝失血失音舌燥喉痛虛火牙痛足跟作痛下部瘡瘍等症熟地八兩山萸肉酒潤山藥各四兩茯苓乳拌丹皮澤瀉各三兩上蜜丸梧子大空心鹽湯下如用作湯分兩酌定崔氏八味丸金匱治命門火衰不能生土以致脾胃虛寒飲食少思泄瀉腹脹或元陽虛憊陽痿精寒臍腹疼痛夜多漩溺膝酸腰軟目昏等症即前六味加肉桂附子各一兩七味丸治肝經氣虛筋無所養變為寒症以致筋骨疼痛腳軟懶行及傷寒服涼藥過多水中無火手足牽引肝經血虛以致火燥筋攣變為結核瘰癧等症即前六味加肉桂一兩都氣丸治勞嗽益肺之源以生腎水也即前六味加五味子八仙長壽丸治虛損勞熱即前六味加五味子二兩麥冬三兩明目地黃丸東垣治腎虛目昏即前六味加柴胡五味歸身硃砂為衣滋腎生肝飲養葵治血虛氣滯或肩背絆痛或胃脘當心而痛或肝火鬱於胃中以致倦怠嗜臥飲食不思口渴咽燥及婦人小便自遺頻數無度即前六味加柴胡五味白朮當歸甘草滋陰腎氣丸治目神水寬大漸散或如霧露中行漸睹空中有黑花視物二體久則光不收及內障瞳神淡白即前六味去萸肉加柴胡五味歸身生地硃砂為衣知柏八味丸治陰虛火動骨痿髓枯即前六味加知母黃柏各二兩加味地黃丸治肝腎陰虛耳內癢痛出水或眼昏痰喘或熱渴便澀等症即前六味加生地柴胡五味左歸飲景嶽治腎水乾枯虛火上蒸脾胃陰土受虧以致飲食不進大便燥結甚至三陽癃閉將成噎膈治之於早無不愈也當以此方加歸芍治傷寒舌黑唇焦大渴引飲此必服攻伐寒涼之藥過多也此方救之治瘧疾而兼燥症熱重寒輕者此方更宜熟地三四錢或加至一二兩山萸肉一二錢畏酸者少用之山藥二錢茯苓錢半甘枸杞二錢甘草一錢水二盞煎七分食遠服如肺熱而煩者加麥冬二錢血滯者加丹皮二錢心熱而躁者加元參二錢血熱妄動者加生地三四錢陰虛不寧者加女貞子二錢上實下虛者加牛膝二錢以導之血虛而燥滯者加當歸二錢脾熱易飢者加白芍二錢腎虛骨蒸多汗者加地骨皮二錢左歸丸景嶽治真陰腎水不足不能滋養營衛漸至衰弱或虛熱往來自汗盜汗或神不守舍血不歸原或遺淋不禁或口燥舌乾或腰痠腿軟或昏運眼花耳聾凡精髓內虧津液枯竭等症俱宜速壯水之主以培左腎之元陰而精血自充矣此方主之大熟地八兩山藥萸肉枸杞菟絲子制鹿角膠切碎炒珠龜膠切碎炒珠各四兩牛膝酒洗蒸熟三兩精滑者不用蜜丸每食前滾清湯或淡鹽湯送下百餘丸如純陰失守虛火上炎者宜用純陰至靜之劑於本方去鹿膠枸杞加女貞麥冬三兩如火爍肺金乾咳多嗽者加百合三兩如氣虛者加人參三四兩如大便燥結去菟絲加肉蓯蓉三兩如血虛微滯加當歸四兩如腰膝痠痛加杜仲三兩鹽水炒用如臟平無火而腎氣不充者加破故紙蓮肉去心胡桃肉各四兩龜膠不必用上丸五液皆主於腎故凡屬陰分之藥無不皆走腎有謂必須導引者皆見之不廣爾右歸飲景嶽此益火之劑也凡命門之陽衰陰勝者宜此方加減主之如治陰盛格陽真寒假熱等症宜加澤瀉二錢煎成用涼水浸冷服之尤妙熟地三四錢或加至一二兩萸肉一錢山藥二錢杜仲薑製二錢枸杞二錢炙甘草一二錢肉桂一二錢製附子一二三錢水二盞煎七分食遠服如氣虛血脫或厥或昏或汗或運或虛狂或短氣者必大加人參白朮隨宜用之如小腹多痛加吳茱萸六七分如火衰不能生土為嘔噦吞酸者加炮薑二三錢如陽衰中寒泄瀉腹痛加人參肉豆蔻隨宜用之如淋帶不止加破故紙一錢如血少血滯腰膝軟痛者加當歸二三錢右歸丸景嶽治元陽不足或先天稟衰或勞傷過度以致命門火衰不能生土而為脾胃虛寒飲食少進或嘔惡膨脹或反胃噎膈或怯寒畏冷或臍腹疼痛或大便不實瀉利頻作或小水自遺虛淋寒疝或寒侵溪谷而肢節痛痹或寒在下焦而水邪浮腫總之真陽不足者必神疲氣怯或心跳不寧或四肢不收或眼見邪祟或陽衰無子等症速宜益火之源以培右腎之元陽而神氣自強矣八味丸治之不愈者宜服此或用右歸飲大熟地八兩山萸肉山藥枸杞菟絲制杜仲薑炒鹿角膠炒珠各四兩當歸三兩便溏勿用附子制肉桂各二兩蜜丸服如前法或丸如彈子大每嚼服二三丸白湯下其效尤速如陽衰氣虛必加人參以為之主蓋人參之功隨陽藥則入陽分隨陰藥則入陰分欲補命門之陽非加人參不能捷效如陽虛精滑或帶濁便溏加補骨脂酒炒三兩如飧泄腎泄不止加五味子三兩肉豆蔻三兩麵炒去油用如飲食減少或不易化或嘔惡吞酸皆脾胃虛寒之症加乾薑三四兩炒黃用如腹痛不止加吳茱萸二兩湯炮半日炒用如腰膝痠痛加胡桃肉連皮四兩如陰虛陽痿加巴戟肉四兩肉蓯蓉三兩或加黃狗外腎一二副以酒煮爛搗入之人參固本丸千金治肺勞虛極脾虛煩熱或小便短赤大便閉結此陰虛有火之聖藥也人參二兩天冬麥冬生地熟地各四兩蜜丸天王補心丹道藏治思慮過度陰血不足怔忡健忘心口多汗大便或祕或結口舌生瘡等症生地四兩柏子仁當歸酒洗酸棗仁各五錢天冬一兩麥冬一兩人參五錢元參五錢丹參五錢五味一兩桔梗五錢茯苓五錢一用茯神遠志肉五錢蜜丸彈子大硃砂為衣臨臥燈心湯下一丸或噙含化一方有石菖蒲四錢無五味子一方有甘草龜鹿二仙膏治瘦弱少氣夢遺泄精目視不明精竭之症鹿角十斤龜板五斤枸杞一斤人參一斤先將鹿角龜板鋸截刮淨水浸桑火熬成膏再將人參枸杞熬膏和入每晨酒服三錢扶桑丸胡僧除風濕起羸尪駐容顏烏鬚髮卻病延年嫩桑葉去蒂洗淨曝乾為末一斤黑芝麻名巨勝子淘淨四兩用白蜜一斤將芝麻擂碎熬濃汁蜜和煉至滴水成珠入桑葉末為丸一方桑葉為末芝麻蒸搗等分蜜丸早鹽湯下晚酒下益氣聰明湯東垣治內障目昏耳鳴耳聾黃耆人參各五錢葛根蔓荊子各三錢白芍黃柏各二錢升麻錢半炙甘草一錢每四錢臨臥服五更再服玉屏風散得效治自汗不止氣虛表弱易感風寒黃耆炙防風各一兩白朮炒二兩為末每服三錢苓朮菟絲丸治脾腎虛損不能收攝以致夢遺精滑困倦等症茯苓白朮各四兩菟絲子倍用蓮肉去心四兩杜仲酒炒三兩山藥二兩五味子酒蒸一兩炙草五錢上用山藥末以陳酒煮糊為丸桐子大空心白滾湯或酒下百餘丸桑螵蛸散寇氏治小便數而欠能安神魂補心氣療健忘人參茯苓一用茯神石菖蒲鹽炒遠志桑螵蛸鹽炒龍骨煅龜板酥炙一用鱉甲當歸等分為末臨臥服二錢人參湯下四君子湯治一切陽虛氣弱脈來虛軟脾衰肺損飲食少思體瘦而黃皮聚毛落言語輕微四肢無力及脾胃不和泄痢虛飽人參白朮土炒茯苓各二錢甘草一錢加薑棗煎服異功散調理脾胃即前四君子加陳皮六君子湯治脾胃氣虛飲食不進致成痰癖不時咳唾或胃氣虛寒動成嘔惡凡虛瘧及諸病後宜之即前四君子加陳皮半夏香砂六君子湯治虛寒胃痛或腹痛泄瀉即前六君子加香附砂仁六神散無擇治小兒表熱去後又發熱者即前六君子加山藥扁豆八珍湯治氣血兩虛及胃損飲食不為肌膚即前四君子合後四物湯十全大補湯治真陰內竭虛陽外鼓即前八珍湯加黃耆肉桂補中益氣湯治煩勞內傷身熱心煩頭痛惡寒懶言惡食脈洪大而虛氣短而渴或陽虛自汗或氣短不能舉元致瘧痢脾虛久不能愈一切清陽下陷中氣不足之症黃耆蜜炙人參甘草炙白朮土炒陳皮當歸各五分升麻柴胡各三分薑三片棗二枚煎服如血不足加當歸精神短少加人參五味肺熱咳嗽去人參嗌乾加葛根頭痛加蔓荊子痛甚加川芎腦痛加藁本細辛風濕相搏一身盡痛加羌活防風有痰加半夏生薑胃寒氣滯加青皮蔻仁木香益智腹脹加枳實厚朴木香砂仁腹痛加白芍甘草熱痛加黃芩能食而心下痞加黃連咽痛加桔梗有寒加肉桂濕勝加蒼朮陰火加黃柏知母陰虛去升麻柴胡加熟地山萸山藥大便祕加酒煨大黃咳嗽春加旋覆款冬夏加麥冬五味秋加麻黃黃芩冬加麻黃不去根節天寒加乾薑泄瀉去當歸加茯苓蒼朮益智如冬月惡寒發熱無汗脈浮而緊加麻黃若脈浮而緩有汗加桂枝白芍調中益氣湯治脾胃不調胸滿肢倦食少短氣口不知味及食入反出即前補中益氣湯去當歸白朮加木香蒼朮四物湯治一切血虛及婦人經病當歸酒洗生地各三錢白芍二錢川芎錢半如涼血心加黃連肝條芩肺枯芩大腸實芩膽黃連腎膀胱黃柏脾生地胃大黃三焦地骨心胞丹皮小腸梔子木通如清氣心與胞絡加麥冬肺枳殼肝柴胡青皮脾白芍胃乾葛石膏大腸三焦連翹小腸赤茯膀胱滑石琥珀血虛加龜板血燥加人乳血瘀加桃仁紅花韭汁童便行之暴血加薄荷元參散之血不止加炒蒲黃京墨久不止加升麻引血歸經婦人經血紫黑脈數為熱加芩連血淡脈遲為寒加桂附人肥有痰加半夏南星橘紅人瘦有火加黑梔知母黃柏郁者加木香砂仁蒼朮神麯瘀滯加桃仁紅花延胡肉桂氣虛加參耆氣實加枳朴王海藏加芩術名溫六合湯治經水過多加梔連名熱六合湯治血熱妄行加薑附名寒六合湯治血海虛寒加艽羌名風六合湯治血虛風癢加陳朴名氣六合湯治氣鬱經阻知柏四物湯治陰虛有火即前四物加知母黃柏羌防四物湯治風虛眩暈風祕便難即前四物加羌活防風元戎四物湯治血結便祕撲損瘀血即前四物加桃仁紅花加味四物湯薛氏治血虛有熱即前四物加丹皮山梔當歸補血湯東垣治傷於勞役肌熱面赤煩渴引飲脈大而虛黃耆炙一兩當歸酒洗二錢空心服歸脾湯濟生治思慮過度勞傷心脾怔忡健忘驚悸盜汗發熱體倦食少不眠或脾虛不能攝血致血妄行及婦人經帶或心脾傷痛嗜臥肢體作痛大便不調或瘰癧流注不能消散潰斂黃耆蜜炙當歸酒洗龍眼肉各二錢棗仁炒研白朮土炒各錢半人參茯神各一錢遠志去心八分木香磨沖甘草各五分薑棗煎如肺腎受傷加麥冬五味肝腎受傷加白芍更為有益如從怫鬱而起則加柴胡丹皮山梔如非二陽之病至怔忡去木香加枸杞如夢遺加熟地五味白芍牡蠣如挾心包有餘之火加黃連生地有痰加貝母如挾相火者加黃柏知母麥冬加味歸脾湯薛氏治血熱即前歸脾湯加丹皮山梔黑歸脾湯治陰虛血少即前歸脾湯加大熟地亦有將全料炒黑用者人參養營湯治脾虛食少無味身倦肌瘦肺虛色枯氣短毛髮脫落小便赤澀營血不足驚悸健忘寢汗發熱諸種虛症人參白朮白芍各錢半黃耆蜜炙當歸二錢茯苓一錢熟地三錢甘草炙陳皮桂心遠志各五分五味十粒加薑棗煎二至丸補腰膝壯筋骨強腎陰烏鬚髮冬青子即女貞實冬至日採不拘多少陰乾蜜酒拌蒸曬乾為末瓷瓶收貯旱蓮草夏至日採不拘多少搗汁熬膏和入臨臥酒服一方加桑椹干為丸或桑椹熬膏和入休瘧飲景嶽此止瘧最妙之方也若汗散既多元氣不復或以衰老或以弱質而瘧有不能止者俱宜用此化暴善後之第一方也人參白朮炒當歸各三四錢何首烏五錢制炙草八分用陰陽水各一盞煎七分露一宿次早溫服如陽虛多寒宜溫中散寒者加乾薑肉桂之類甚者或加製附子如陰虛多熱煩渴喜冷宜滋陰清火者加麥冬生地芍藥甚者加知母或加黃芩如腎陰不足水不制火虛煩虛餒腰痠腳軟者加熟地山藥杜仲之類如邪有未盡而留連難愈者於此方加柴胡麻黃細辛紫蘇之屬自無不可如氣血多滯者或加酒水各一盞煎服藥後飲酒數杯亦可桂枝湯仲景治太陽中風陽浮而陰弱發熱頭痛自汗惡寒鼻鳴乾嘔及陽明病脈遲汗出多微惡寒者表未解也可發汗桂枝三兩芍藥三兩甘草炙二兩大棗十二枚生薑三兩熱服須臾啜稀熱粥以助藥力宜溫覆取微汗不可令如水淋漓汗出病瘥停後服服一劑盡病症猶在者更作服神朮散海藏治內傷冷飲外感寒邪而無汗者蒼朮制防風各二兩甘草炙一兩加生薑蔥白煎如太陽症發熱惡寒脈浮緊者加羌活浮緊帶洪者是兼陽明加黃芩浮緊帶弦數者是兼少陽加柴胡香蘇飲局方治四時感冒頭痛發熱或兼內傷胸膈滿悶噯氣惡食香附炒紫蘇各二錢陳皮去白一錢甘草七分加薑蔥煎傷食加消導藥咳嗽加杏仁桑皮有痰加半夏頭痛加川芎白芷傷風鼻塞頭昏加羌活荊芥心中卒痛加延胡索酒一杯清震湯治雷頭風頭面疙瘩腫痛憎寒壯熱狀如傷寒升麻蒼朮各五錢荷葉一枚小柴胡湯仲景治傷寒中風少陽症往來寒熱胸脅痞滿心煩喜嘔默默不欲食或脅下痛或腹中痛或渴或利或咳或悸小便不利耳聾口苦脈弦柴胡半斤黃芩三兩人參三兩甘草一兩生薑四兩半夏半升大棗十二枚水一斗二升煮六升去渣再煎取三升溫服一升日三服嘔逆加生薑以散逆陳皮以理氣煩而不嘔去半夏人參加栝蔞以蕩鬱熱渴者去半夏加花粉以生津若渴外有微熱去參加桂枝以解肌覆取微汗咳嗽去參棗生薑加五味以斂肺乾薑以散寒齒燥無津加石膏以清胃止渴虛煩加竹葉以涼心糯米以和胃痰熱加栝蔞貝母腹痛去黃芩加芍藥脅下痞硬去大棗加牡蠣脅下痛加青皮白芍心下悸小便不利去黃芩加茯苓本經頭痛加川芎發黃加茵陳以利濕越鞠丸丹溪統治六郁胸膈痞悶吞酸嘔吐飲食不消香附醋炒蒼朮泔制撫芎神麯梔子炒黑等分麵糊丸如濕鬱加茯苓白芷火鬱加青黛痰鬱加半夏南星栝蔞海石血鬱加桃仁紅花氣鬱加木香檳榔食鬱加山楂麥芽砂仁挾寒少加吳茱萸逍遙散局方治血虛肝燥骨蒸勞熱潮熱咳嗽往來寒熱口乾便澀月經不調凡肝膽兩經鬱火以致脅痛頭眩或胃脘當心而痛或肩胛絆痛或時眼赤痛連及太陽婦人鬱怒傷肝致血妄行赤白淫閉沙淋崩濁等症俱宜此方加減治之易曰風以散之是也當歸酒拌白芍酒炒各錢半白朮土炒柴胡茯苓各一錢甘草炙五分加煨薑薄荷煎加味逍遙散薛氏治怒氣傷肝血少目暗即前逍遙散加丹皮山梔黑逍遙散治肝腎陰虛即前逍遙散加大熟地藿香正氣散局方治外感風寒內傷飲食憎寒壯熱頭痛嘔逆胸膈滿悶咳嗽氣喘及傷冷傷濕瘧疾中暑霍亂吐瀉凡感嵐瘴不正之氣者並宜增減用之藿香紫蘇白芷大腹皮茯苓各三兩白朮陳皮半夏曲厚朴桔梗各二兩甘草一兩每服五錢加薑棗煎一方加木瓜枳朮丸潔古消痞除痰健脾進食白朮二兩土蒸枳實一兩麩炒為末荷葉包陳米飯煨乾為丸痞悶加陳皮氣滯加木香傷食加麥芽神麯平胃散局方治脾有停濕痰飲痞膈宿食不消滿悶嘔瀉蒼朮泔制二錢厚朴薑製陳皮去白甘草炙各一錢加薑棗煎傷食加神麯麥芽或枳實濕勝加五苓痰多加半夏脾倦不思食加參耆痞悶加枳殼木香大便祕加大黃芒硝小便赤澀加苓澤傷寒頭痛加蔥頭取微汗不換金正氣散局方治胃寒腹痛嘔吐即前平胃散加藿香半夏胃苓湯治中暑傷濕停飲夾食腹痛泄瀉及口渴便祕即前平胃散合後五苓散五苓散仲景治諸濕腹滿水飲水腫嘔逆泄瀉水寒射肺或喘或咳中暑煩渴身熱頭痛膀胱積熱便祕而渴霍亂吐瀉痰飲濕瘧身痛身重豬苓茯苓白朮炒共十八銖澤瀉一兩六銖半肉桂半兩或用桂枝為末每服三錢服後多飲熱水汗出而愈傷暑者加硃砂燈心煎蒼朮五苓散治寒濕即前五苓散加蒼朮茵陳五苓散治濕熱發黃便祕煩渴即前五苓散加茵陳豬苓湯仲景治濕熱黃疸口渴溺赤即前五苓散去朮桂加阿膠滑石澤瀉湯金匱治心下支飲常苦眩冒即前五苓散但用澤瀉五兩白朮二兩春澤湯治無病而渴與病瘥後渴者即前五苓散合四君子湯金匱腎氣丸治脾腎大虛肚腹脹大四肢浮腫喘急痰盛小便不利大便溏黃已成蠱症亦治消渴飲一溲二熟地四兩茯苓三兩山藥微炒丹皮酒洗山萸酒潤澤瀉酒浸牛膝酒浸車前微炒肉桂各一兩附子制五錢蜜丸貞元飲景嶽治氣短似喘呼吸促急提不能升咽不能降氣道噎塞勢極垂危者常人但知為氣急其病在上而不知元海無根肝腎虧損此子午不交氣脫病也嘗見婦人血海常虧者最多此症宜以此飲濟之緩之敢云神劑凡診此脈必微細無神若微而兼緊尤為可畏倘庸衆不知妄云痰逆氣滯用牛黃蘇合及青陳枳殼破氣等劑則速其危熟地七八錢或一兩當歸二三錢炙草一二三錢如兼嘔惡或惡寒者加煨薑三五片如氣虛脈至極者急加人參隨宜如肝腎陰虛手足厥逆者加肉桂一錢佛手散治産後血虛頭痛川芎當歸為末服五皮飲淡寮治水病腫滿上氣喘急或腰以下腫五加皮地骨皮茯苓皮大腹皮生薑皮一方五加易陳皮羅氏五加易桑白皮治病後脾肺氣虛而致腫滿萆薢分清飲治陽虛白濁小便頻數漩白如油名曰膏淋川萆薢石菖蒲烏藥益智仁甘草梢減半入鹽服一方加茯苓理中湯仲景治傷寒太陰病自利不渴寒多而嘔腹痛便溏脈沉無力或厥逆拘急或結胸吐蛔及感寒霍亂凡中宮虛寒氣不能理諸症俱宜用此分理陰陽調和胃氣人參一兩白朮土炒二兩乾薑炮甘草炙各一兩自利腹痛者加木香不痛利多者倍白朮渴者倍白朮蜷臥沉重利不止加附子腹滿去甘草嘔吐去白朮加半夏薑汁臍下動氣去朮加桂悸加茯苓發黃加茵陳寒實結胸加枳實附子理中湯治中寒腹痛身痛四肢拘急即前理中湯加附子一枚枳實理中湯治寒實結胸欲絶胸膈高起手不可近者即前理中湯加枳實桂枝人參湯仲景治太陽表症不除而數下之協熱而利心下痞硬表裡不解者即前理中湯加桂枝倍甘草理陰煎景嶽治真陰虛弱脹滿嘔逆痰飲噁心吐瀉腹痛婦人經遲血滯等症熟地三五七錢或三兩當歸二三錢或五七錢乾薑炒黃色二三錢甘草炙一二錢或加肉桂一二錢加附子名附子理陰煎若風寒外感邪未深入但見發熱脈數不洪凡內無火症素稟不足者但用此湯加柴胡錢半或二錢連進一二服其效如神若寒凝陰盛而邪有難解者必加麻黃一二錢放心用之或不用柴胡亦可恐其清利也若陰勝之時外感寒邪脈細惡寒或背惡寒者乃太陽少陰症也加細辛一二錢甚者再加附子一二錢若陰虛火盛其有內熱不宜用溫而氣血俱虛邪不能解者宜去薑桂單以三味與之加減或止加人參亦可若脾胃兩虛水泛為痰或嘔或脹者加茯苓錢半或加白芥子五分以行之若泄瀉不止及腎瀉者宜少用當歸或並去之加山藥扁豆吳茱萸破故紙肉豆蔻附子若腰腹有痛加杜仲牛膝若腹有脹滯疼痛加陳皮木香砂仁四逆湯仲景治三陰傷寒身痛腹痛下利清穀惡寒不渴四肢厥冷或反不惡寒面赤煩躁裡寒外熱或乾嘔或咽痛脈沉微細欲絶附子一枚生用乾薑一兩甘草二兩炙冷服面赤者格陽於上也加蔥九根以通陽腹痛真陰不足也加芍藥二兩以斂陰咽痛陰氣上結也加桔梗一兩以利咽利止脈不出加人參二兩以助陽補氣血嘔吐加生薑二兩以散逆氣當歸四逆湯治感寒手足逆冷脈細欲絶及寒疝臍下冷引腰胯痛即前四逆湯加當歸木通又桂枝湯加當歸木通細辛亦名當歸四逆湯茵陳四逆湯治陰黃即前四逆湯加茵陳四逆加人參湯治惡寒脈微復利利止亡血即前四逆湯加人參四神丸治腎瀉脾瀉破故紙酒浸四兩五味子三兩炒肉豆蔻二兩麵煨吳茱萸一兩鹽水泡用大棗百枚生薑八兩切片同煮棗爛去薑取棗肉搗丸每服二錢臨臥鹽湯下香薷飲治感冒暑氣皮膚蒸熱頭痛重或煩渴或吐瀉香薷一兩厚朴薑汁炒扁豆炒各五錢冷服或加黃連二香散治外感內傷身熱腹脹即前香薷飲合香蘇飲加蒼朮木瓜大順散治冒暑伏熱引飲過多脾胃受濕水穀不分清濁相干陰陽氣逆霍亂吐瀉臟腑不調乾薑肉桂杏仁去皮尖甘草等分先將甘草用白砂炒次入薑杏炒過篩去砂淨合桂為末每服二三錢湯點服二妙散治諸般濕熱蒼朮黃柏為末服清燥湯東垣治肺金受濕熱之邪痿躄喘促胸滿少食色白毛敗頭眩體重身痛肢倦口渴便祕即前二妙散加參耆歸地朮草陳連麥味升柴豬茯澤曲六一散河間治傷寒中暑表裡俱熱煩躁口渴小便不通瀉痢熱瘧霍亂吐瀉下乳滑胎解酒熱毒偏主石淋滑石六兩甘草一兩為末冷水或燈心湯下生脈散千金治熱傷元氣氣短倦怠口渴多汗肺虛而咳人參麥冬各五分五味子七粒五味子湯千金治傷燥咳唾中有血牽引胸脅痛皮膚乾枯五味子五分桔梗甘草紫菀茸續斷竹茹桑白皮一錢蜜炙生地二錢赤小豆一撮上九味水煎空心服祕旨加白蜜一匙麥門冬湯千金治大病後火熱乘肺咳唾有血胸膈脹滿上氣羸瘦五心煩熱渴而便祕麥冬二錢桔梗桑皮半夏生地紫菀竹茹各一錢麻黃七分甘草五分炙五味子十粒生薑一片水煎空心服茵陳蒿湯仲景治傷寒陽明病但頭汗出腹滿口渴二便不利濕熱發黃脈沉實者茵陳六兩大黃二兩梔子十四枚炒上三味以水一斗先煮茵陳減六升內二味煎至三升去渣分溫三服小便當利尿如皂角汁狀色正赤一宿腹減黃從小便去也八正散局方治濕熱下注咽乾口渴少腹急滿小便不通或淋痛尿血或因熱為腫車前子木通瞿麥萹蓄滑石山梔炒黑甘草梢大黃加燈心煎一方加木香小承氣湯仲景治傷寒陽明症譫語便硬潮熱而喘及雜病上焦痞滿不通大黃四兩厚朴二兩薑炒枳實三枚麩炒水四升煮一升二合去渣分溫二服初服當更衣不爾者盡飲之若更衣勿服陶氏黃龍湯治正虛邪實即前小承氣湯加人參當歸生地薑棗煎服強實者可加芒硝大陷胸丸仲景治傷寒結胸項強如柔痙狀大黃八兩杏仁去皮尖葶藶炒芒硝各半升合研取如彈丸大一枚別搗甘遂末一錢白蜜丸合煮服濟川煎景嶽凡病涉虛損而大便閉結不通則硝黃攻擊等劑必不可用若勢有不得不通者宜此主之此用通於補之劑也當歸三五錢牛膝二錢肉蓯蓉酒洗二三錢澤瀉錢半升麻五七分或一錢枳殼一錢虛甚者不可用如氣虛加人參無妨礙如有火加黃芩腎虛加熟地清燥救肺湯喻氏治諸氣膹郁諸痿喘嘔二桑葉三錢石膏二錢半煅甘草一錢人參七分麻仁炒研一錢阿膠八分麥冬去心一錢二分杏仁去皮尖炒七分枇杷葉一片刷去毛蜜炙水一碗煎六分頻頻滾熱服痰多加貝母栝蔞血枯加生地熱甚增石膏甘露飲潔古治胸中客熱牙宣口氣齒齦腫爛時出膿血吐血衄血目瞼垂重常欲合閉或即飢煩不欲食飲及目赤腫痛不任涼藥口舌生瘡咽喉腫痛瘡疹已發皆可服之又治脾胃受濕瘀熱在裡或醉飽房勞濕熱相搏致生疸病身目皆黃肢體微腫胸滿氣短大便不調小便黃澀或時身熱生地熟地天冬麥冬石斛茵陳黃芩枳殼枇杷葉甘草如胃中有火而又挾肝木之勢者加丹皮山梔渴甚者加知母火盛者加石膏黃連半夏瀉心湯仲景治傷寒下之早胸滿而不痛者為痞身寒而嘔飲食不下非柴胡症半夏半升黃芩三兩黃連一兩甘草三兩炙人參三兩乾薑三兩大棗十二枚白虎湯仲景治傷寒脈浮滑表有寒里有熱及三陽合病脈浮大腹滿身重難以轉側口不仁而面垢譫語遺尿強汗則譫語下之則頭上生汗手足逆冷自汗出者通治陽明病脈洪大而長不惡寒反惡熱頭痛自汗口渴舌燥目痛鼻乾不得臥心煩躁亂日晡潮熱或陽毒發斑胃熱諸病石膏一斤知母六兩甘草二兩粳米六合先煮石膏數十沸再投藥米米熟湯成溫服竹葉石膏湯仲景治傷寒解後虛羸少氣氣逆欲吐亦治傷暑發渴脈虛竹葉二把石膏一斤人參三兩甘草二兩炙半夏半升麥冬一升粳米半升加薑煎滋腎丸東垣又名通關丸治下焦邪熱口不渴而小便祕及腎虛蒸熱腳膝無力陰痿陰汗衝脈上衝而喘黃柏二兩酒炒知母一兩酒炒桂一錢蜜丸抽薪飲景嶽治諸凡火盛而不宜補者黃芩石斛木通梔子炒黃柏各五錢枳殼錢半甘草三分煎成食遠溫服如熱在經絡肌膚者加連翹花粉以解之熱在陽明頭面或躁煩便熱者加生石膏以降之熱在下焦小水痛澀者加草龍膽車前以利之熱在陰分津液不至者加麥冬生地白芍之類以滋之熱在腸胃實結者加大黃芒硝以通之徙薪飲景嶽治三焦氣火一切內熱漸覺而未甚者先宜清以此劑其甚者宜抽薪飲黃芩二錢麥冬白芍黃柏茯苓丹皮各錢半陳皮八分如多鬱氣逆傷肝脅肋疼痛或致動血者加青皮梔子龍膽瀉肝湯局方治肝膽經實火濕熱脅痛耳聾膽溢口苦筋痿陰汗陰腫陰痛白濁溲血龍膽草酒炒黃芩炒梔子酒炒澤瀉木通車前子當歸酒洗生地酒炒柴胡生甘草瀉青丸錢乙治肝火鬱熱不能安臥多驚多怒筋痿不起目赤腫痛當歸川芎羌活防風大黃龍膽草梔子等分蜜丸彈子大每服一丸竹葉湯化下瀉白散錢乙治肺火皮膚蒸熱灑淅寒熱日晡尤甚喘嗽氣急桑白皮地骨皮各一錢甘草五分粳米百粒瀉黃散錢乙治脾胃伏火口燥唇乾口瘡口臭煩渴易飢熱在肌肉升麻白芷防風枳殼黃芩各錢半石斛錢二分半夏一錢甘草七分導赤散錢乙治小腸有火便赤淋痛面赤狂躁口糜舌瘡咬牙口渴生地木通甘草梢淡竹葉玉女煎景嶽治水虧火勝六脈浮洪滑大少陰不足陽明有餘煩熱乾渴頭痛牙疼失血等症其效如神若大便溏泄者大非所宜生石膏三五錢熟地三五錢或一兩麥冬二錢知母二錢牛膝錢半如火之極盛者再加梔子地骨皮之屬亦可如多汗多渴者加五味子十四粒如小水不利或火不能降者加澤瀉錢半或茯苓亦可如金水俱虧因精損氣者加人參二三錢尤妙左金丸治肝膽鬱火左脅作痛或胸脅痛不可忍吞酸吐酸筋疝痞結酒濕發黃亦治噤口痢湯藥入口即吐黃連六兩薑汁炒吳茱萸一兩鹽水泡水丸三黃丸又名三補丸治三焦有火嗌燥喉干二便閉結及濕痰夜熱黃連黃芩黃柏粥丸亦有去黃柏用大黃者普濟消毒飲東垣治大頭天行初覺憎寒體重次傳頭面腫盛口不能開上喘咽喉不利口渴舌燥黃芩酒炒黃連酒炒各五錢陳皮去白甘草元參柴胡桔梗各二錢連翹板藍根馬勃鼠黏子薄荷各一錢殭蠶升麻各七分為末湯調時時服之或蜜拌為丸噙化一方無薄荷有人參三錢亦有加大黃治便祕者或酒浸或煨用香連丸直指治脾胃兩經中濕火傳變大腸下痢赤白膿血相雜裡急後重黃連二十兩吳茱萸十兩同炒去茱萸用木香四兩八錢不見火醋和丸米飲下一方等分蜜丸一方加甘草八兩黃連用蜜水拌蒸曬九次入木香為丸大補元煎景嶽治男婦氣血大虧精神失守急劇等症此回天贊化救本培元第一要方人參一二錢熟地三四錢或三兩山藥炒杜仲各二錢當歸二三錢萸肉一錢枸杞二三錢甘草一二錢炙如元陽不足多寒者加附子肉桂炮薑之屬隨宜用之如氣分偏虛者加黃耆白朮胸口多滯者不必用如血澀者加川芎去萸肉如滑泄者去當歸加五味故紙五福飲景嶽凡五臟氣血虧損者此能兼治之足稱王道之最人參熟地隨宜當歸二三錢白朮炒錢半甘草炙一錢加薑棗凡氣血俱虛等症以此為主或宜溫者加薑附宜散者加柴麻升葛左右逢源無不可也宜涼者亦當隨宜加之五君子煎景嶽治脾胃虛寒嘔吐泄瀉而兼濕者人參二三錢白朮茯苓各二錢炙草一錢乾薑炒黃一二錢水一盅半煎服六味異功煎景嶽治症同前而兼微滯者即前方加陳皮一錢此即五味異功散加乾薑也五物煎景嶽治婦人血虛凝滯蓄積不行小腹痛急産難經滯及痘瘡血虛寒滯等症神效當歸三五七錢熟地三四錢白芍二錢酒炒川芎一錢肉桂一二三錢兼胃寒及嘔惡者加乾薑炮用水道不利加澤瀉或豬苓氣滯者加香附或丁香木香砂仁烏藥陰虛疝痛者加小茴香血滯不行臍下若覆杯漸成積塊者加桃仁紅花六物煎景嶽治氣血俱虛等症熟地或用生地當歸川芎三四分不宜多白芍俱隨宜加減人參炙草加減一陰煎景嶽治水虧火勝之甚者生地二錢熟地三五錢白芍二錢甘草五七分炙麥冬二錢知母地骨皮各一錢如躁煩熱甚便結者加石膏二三錢如小水熱澀者加梔子一二錢如火浮於上者加澤瀉一二錢或黃芩一錢如血燥血少者加當歸一二錢二陳湯局方治一切痰飲為病咳嗽脹滿嘔吐噁心頭眩心悸半夏薑製二錢陳皮去白茯苓各一錢甘草五分加生薑煎風痰加南星白附皂角竹瀝寒痰加薑汁火痰加石膏青黛濕痰加二術燥痰加蔞杏食痰加楂麥神麯老痰加枳實海石芒硝氣痰加香附枳殼脅痰及在皮裡膜外加白芥子四肢痰加竹瀝六安煎景嶽治風寒咳嗽痰滯氣逆陳皮錢半半夏二三錢茯苓二錢甘草一錢杏仁一錢白芥子五七分年老氣弱者不用加生薑三五七片凡外感風邪咳嗽而寒氣盛者多不易散宜加細辛七分若冬月寒邪盛者加麻黃桂枝亦可若風勝而邪不甚者加防風一錢或蘇葉亦可若頭痛鼻塞者加川芎白芷蔓荊子皆可若兼寒熱加柴胡蘇葉若風邪咳嗽不止而兼肺胃之火者加黃芩一二錢甚者再加知母石膏所用生薑止宜一片凡寒邪咳嗽痰不利者加當歸二三錢老年者尤宜凡時行初感痰勝而氣不順者加藿香一錢兼脹滿者加厚朴一錢暫開痰氣然後察其寒熱虛實而調補之若氣虛猝倒氣平無痰者皆不可用此金水六君煎景嶽治肺腎虛寒水泛為痰或年邁陰虛血氣不足外受風寒咳嗽嘔惡多痰喘急等症神效妙劑當歸二三錢熟地三五錢陳皮錢半半夏二錢茯苓二錢炙草一錢加生薑三五七片如大便不實而多濕者去當歸加山藥如痰盛氣滯胸膈不快者加白芥子七分如陰寒盛而嗽不愈者加細辛五七分如兼表邪寒熱者加柴胡一二錢滾痰丸王隱君治實熱老痰怪症百病青礞石一兩沉香五錢大黃酒蒸黃芩各半斤將礞石打碎同焰硝一兩同入瓦罐鹽泥固濟曬乾火煅石色如金為度研末和諸藥水丸量人虛實服之薑湯送下服後仰臥令藥在胸膈之間除逐上焦痰滯不宜飲水行動牛黃丸治中風痰火閉結或瘛瘲癱瘓語言蹇澀恍惚眩運精神昏憒不省人事或喘嗽痰壅煩心等症牛黃麝香龍腦三味另研羚羊角當歸防風黃芩柴胡白朮麥冬去心白芍各七錢半桔梗茯苓杏仁去皮尖川芎大豆黃卷阿膠各八錢半蒲黃人參神麯各一兩二錢半雄黃四錢另研甘草二兩半白蘞肉桂去皮乾薑各三錢七分犀角一錢鎊山藥三兩半大棗五十枚皮去核金箔六百五十片內存二百片為衣為細末煉蜜同棗膏丸每兩作十丸金箔為衣每服一丸溫水化下三生飲治寒氣中臟六脈沉細痰壅喉響不省人事乃寒痰厥逆之症生烏頭生南星生附子各錢半生薑五片生木香五分水煎服薛立齋曰每服必用人參駕馭而行方為有益大秦艽湯治風中經絡口眼歪斜半身不遂或語言蹇澀乃血弱不能養筋宜用養血疏風之劑經曰治風先治血血行風自滅是也秦艽錢半生地熟地白芍當歸川芎羌活獨活防風白朮甘草黃芩酒炒白芷各八分細辛三分水煎服如或煩躁口渴加石膏錢半陰雨加生薑三片春夏加知母八分橘紅半夏湯治痰氣上逆橘紅半夏各一兩濃煎加生薑汁服橘皮竹茹湯金匱噦逆者此湯主之橘皮二升竹茹二升大棗三十枚生薑半斤甘草五兩人參一兩上六味以水一斗煮取三升溫服一升日三服後人加半夏麥冬赤茯苓枇杷葉亦以此名半夏生薑加大黃湯金匱病人胸中似喘不喘似嘔不嘔似噦不噦心中憒憒然無奈者此湯主之半夏半升生薑汁一斤大黃量加水七升煮半夏取二升內薑汁煮取一升分四服日三夜一服止停後服黃連阿膠湯仲景少陰病得之二三日以上心中煩不得臥此湯主之黃連四兩黃芩一兩芍藥二兩阿膠三兩雞子黃二枚上五味以水六升煮三物去渣內膠煬盡小冷內雞子黃擾令相得溫服七合日三服萎蕤湯活人書治風溫兼療冬溫及春月中風傷寒發熱頭眩喉痛咽乾舌強胸內疼痞滿腰背強萎蕤三錢石膏一兩杵碎白薇麻黃湯泡焙葛根一兩羌活川芎甘草杏仁去皮尖各半兩青木香一分冬一兩春半兩炒上銼劑如麻豆大每服五錢水一盞半煎一盞日三服脾腎雙補丸仲淳人參蓮肉炒山萸烘山藥各一斤炒五味子蜜蒸菟絲子各半斤橘紅砂仁各六兩炒車前子米泔浸巴戟肉各十二兩甘草汁煮肉豆蔻十兩補骨脂一斤鹽水浸炒上為末煉蜜丸如虛而有火或火盛肺熱者去人參肉豆蔻巴戟肉補骨脂當歸抑氣散嚴氏治婦人氣盛於血變生諸症頭暈膈滿當歸三兩香附四兩陳皮二兩茯神一兩甘草一兩炙每服二錢達原飲吳氏檳榔二錢厚朴一錢草果五分知母一錢芍藥一錢黃芩一錢甘草五分水二盅煎八分午後溫服三消飲吳氏邪漸入胃此方乃表裡分消法也即前達原飲加羌活葛根柴胡大黃薑棗煎服涼膈散局方治心火上盛膈熱有餘目赤頭眩口瘡唇裂吐衄涎嗽稠黏二便淋閉胃熱發斑瘡疹黑陷諸風痓瘲手足掣搦筋攣疼痛連翹梔子薄荷黃芩甘草芒硝大黃加棗二枚蔥一根水煎清心涼膈散治症同上即前涼膈散加黃連竹葉煎成去渣入蜜少許溫服如頭痛加防風川芎石膏田氏五子飲治精氣不固夢遺滑脫枸杞子菟絲子五味子車前子覆盆子水煎服滋燥養榮湯治爪枯膚燥兼風祕火爍金傷血液亡生地熟地黃芩甘草當歸白芍秦艽防風三化湯潔古治中風外有六經之形症內有便溺之阻即小承氣湯加羌活犀角地黃湯局方治勞動心火熱入血室吐血衄血發黃發狂及小兒瘡痘血熱等症犀角尖生地白芍丹皮水煎服或地漿水煎治氣六合湯海藏治氣鬱經阻四物湯加厚朴陳皮水煎服戊己丸局方治脾經受濕瀉痢不止水穀不化臍腹刺痛黃連吳茱萸白芍各五兩一方黃連四兩吳茱萸二兩白芍三兩上為細末麵糊丸桐子大每服七十丸空心食前米飲下導赤各半湯節庵治勞動心神伏邪抑發人參麥冬茯神甘草犀角尖黃連知母黃芩梔子滑石水煎服吳萸四逆湯治厥陰中寒小腹痛甚附子乾薑甘草吳茱萸加生薑水煎服三妙散治濕熱上行即二妙散加牛膝為末服補肝散簡易治肝虛目睛疼冷淚不止筋脈痛及羞明怕日夏枯草五錢香附一兩為末每服一錢臘茶調下服無時當歸養榮湯原機治睛珠痛甚不可忍熟地白芍歸身川芎各一錢羌活防風白芷各七分半上方以七情五賊勞役飢飽重傷脾胃脾胃者多血多氣之所脾胃受傷則血亦病血養睛睛珠屬腎今生意已不升發又復血虛不能養睛故睛痛甚不可忍以防風升發生意白芷解利引入胃經為君白芍止痛益血通血承接上下為臣熟地補腎水真陰為佐當歸川芎行血補血羌活除風引入少陰為使血為邪勝睛珠痛者及亡血過多之病俱宜服也服此藥後睛痛雖除眼睫無力常欲垂閉不減者助陽活血湯主之助陽活血湯原機治眼睫無力常欲垂閉黃耆甘草當歸防風各五分白芷蔓荊子各四分升麻柴胡各七分上方以黃耆治虛勞甘草補元氣為君當歸和血補血為臣白芷蔓荊子防風主療風升陽氣為佐升麻導入足陽明足太陰脾胃柴胡引至足厥陰肝經為使心火乘金水衰反制者亦宜服也當歸補血湯原機治男子衄血便血婦人産後崩漏亡血過多致睛珠疼痛不能視物羞明酸澀眼睫無力眉骨太陽俱各痠痛生地四分熟地當歸各六分白芍川芎牛膝白朮甘草防風各五分天門冬四分上方專補血故以當歸熟地為君川芎白芍牛膝為臣以其祛風續絶定痛而通補血也甘草白朮大和胃氣用以為佐防風升發生地補腎天門冬治血熱謂亡血生風燥故以為使五退散治眼中翳障蛇蛻蟬蛻蠶蛻豬蹄爪穿山甲防風菊花草決明石決明甘草上為細末每服二錢食後薄荷湯下千金磁朱丸原機治神水寬大漸散昏如霧露中行漸睹空中有黑花漸睹物成二體久則光不收及內障神水淡緑色淡白色者磁石吸針者辰砂神麯先以磁石置巨火中煅醋淬七次曬乾另研極細二兩辰砂另研極細一兩生神麯末三兩與前藥和勻以神麯末一兩水和作餅煮浮為度搜入前藥煉蜜為丸如梧子大每服十丸加至三十丸空心飯湯下上方以磁石辛鹹寒鎮墜腎經為君令神水不外移也辰砂微甘寒鎮墜心經為臣肝其母此子能令母實也肝實則目明神麯辛溫甘化脾胃中宿食為佐生用者發其生氣熟用者斂其暴氣也服藥後俯視不見仰視漸睹星月者此其效也亦治心火乘金水衰反制之病久病纍發者服之則永不更作空心服此午前更以石斛夜光丸主之王肯堂按此方磁石法水入腎辰砂法火入心而神麯專入脾胃乃道家黃婆媒合嬰奼之理倪生釋之為費詞矣或加沉香半兩升降水火之義石斛夜光丸治症同上人參天冬焙茯苓各二兩麥冬生地熟地各一兩菟絲子甘菊草決明杏仁山藥枸杞子牛膝酒浸各七錢半五味子蒺藜石斛蓯蓉川芎甘草炙枳殼麩炒青葙子防風黃連犀角羚羊角鎊各五錢為細末煉蜜丸如桐子大每服三五十丸溫酒鹽湯送下又名固本還睛丸上方羡補藥也補上治下利以緩利以久不利以速也故君以天冬人參菟絲之通腎安神強陰填精也臣以麥冬五味杏仁茯苓枸杞牛膝二地之斂氣除濕涼血補血也佐以甘菊蒺藜石斛蓯蓉川芎甘草枳殼山藥青葙之治風療虛益氣祛毒也使以防風黃連草決羚羊犀角之散滯泄熱解結明目也陰弱不能配陽之病並宜服之此從則順之治法也濟陰地黃丸治足三陰虧損虛火上炎致目瞳散大視物不的或昏花澀緊作痛羞明或卒見非常等症熟地萸肉山藥麥冬五味子當歸枸杞子菊花巴戟肉肉蓯蓉上為末煉蜜丸桐子大每服七八十丸空心白湯下加減駐景丸治肝腎氣虛視物䀮䀮血少氣多熟地當歸各五兩枸杞子五味子車前子各二兩略炒楮實子無翳不用菟絲子酒煮焙半斤川椒上為細末蜜水煮和丸如桐子大每服三十丸空心溫酒送下鹽湯亦可三仁五子丸治肝腎不足體弱眼昏內障生花不計遠近即前駐景丸加柏仁棗仁米仁蓯蓉茯苓沉香等分為末蜜丸桐子大每服五十丸空心鹽湯下四物五子丸治腎虧血虧即前駐景丸合四物六味五子丸治左尺無力或脈數有熱真陰虛者即前駐景丸去歸地合六味地芝丸治目能遠視不能近視生地焙天冬各四兩枳殼炒菊花各二兩上為細末煉蜜丸桐子大每服一百丸茶清送下定志丸治目能近視不能遠視遠志去苗心菖蒲各二兩人參茯苓各一兩為細末蜜丸硃砂為衣每服十丸加至二十丸食後米飲下除風益損湯原機治目為物傷四物湯各一錢防風前胡藁本各七分水煎服上方以熟地補腎水為君黑睛為腎之子此虛則補其母也以當歸補血目為血所養今傷則血病白芍補血又補氣為血病氣亦病也為臣川芎治血虛頭痛藁本通血去頭風為佐前胡防風通療風邪俾不凝留為使兼治亡血過多之病加味四物湯治打傷眼目即四物湯加防風荊芥等分為散每服三錢水一盞半煎至一盞再入生地汁少許去渣溫服再以生地一兩杏仁二十粒去皮尖研爛用綿紙裹藥敷在眼上令乾人參補陽湯原機治傷寒餘邪不散上走空竅其病隱澀赤腫生翳羞明頭腦骨痛羌活獨活各六分白芍生地澤瀉各三分人參白朮茯苓黃耆甘草當歸熟地酒洗焙各四分柴胡防風各五分水煎服上方分利陰陽升降上下之藥也羌活獨活為君導陽之升也茯苓澤瀉為臣導陰之降也參朮大補脾胃內盛則邪自不容耆防大實皮毛外密則邪自不入為之佐也當歸熟地俱生血謂目得血而能視也生地補腎水謂神水屬腎白芍理氣柴胡行經甘草和百藥為之使也神效黃耆湯東垣治目緊縮小羞明畏日視物不明黃耆二錢人參八分蔓荊子甘草炙陳皮各一錢白芍水煎臨臥熱服五味瀉白散治風熱翳膜血筋一切肺熱外障當歸生地白芍梔子黃芩各等分為末每服三五錢為散為湯任服清寧丸治一切熱病大黃十斤須錦紋者切作小塊如棋子大用好酒十斤先將泔水浸大黃浸透以側柏葉鋪甑入大黃蒸過曬乾以酒浸之再蒸曬收干另用桑葉桃葉槐葉大麥黑豆緑豆各一斤每味煎汁蒸收每蒸一次仍用側柏葉鋪甑蒸過曬乾再蒸再曬制後再用半夏厚朴陳皮白朮香附車前各一斤每味煎汁蒸收如上法蒸過曬乾再用好酒十斤制透煉為梧子大丸每服一二錢或為散亦可珠參散新方治真陰不足陰涸內熱內障青盲真珠人參等分為末人參湯送或蓮肉湯亦可行血散新方治血為邪乘凝住經絡或因過服寒涼遏抑陽氣阻塞不通致目生翳膜視物少形及婦人經水不至睛赤珠疼起星起障胬肉羞明等症紅花蘇木或合四物六物或合逍遙八珍隨時酌用清暑湯新方治夏月貪涼飲冷遏抑陽氣以致頭痛惡寒相火上炎兩目紅腫眵淚如膿甚者色帶黃滯睛珠翳障及深秋伏暑內發赤澀羞明藿香青蒿滑石以三味作湯暑必傷氣藿香辛溫通氣暑必兼熱青蒿苦寒清熱暑必挾濕滑石甘淡除濕或合四君或合六味或合生脈異功逍遙散均可隨症酌用清火湯新方治天行熱毒人有受之即發頭疼目赤癢痛異常或淚如血水舌紅口渴小便短赤連翹山梔歸尾赤芍石斛水煎服連翹除其上熱山梔導其下熱歸芍破其血為血實宜破之也石斛清其中為中熱宜清之也合導赤散同用以治兩皆紅腫之症應手取效柏香丸新方專治胬肉板睛或眼生血疣神效異常數服之後胬肉即退若血疣則不摘而自落屢試屢驗用者珍之側柏葉同在黃拌蒸數次香附制水法丸每服二錢和肝散新方治肝氣不和目赤腫痛或因含怒未發郁傷肝陰以致肝陽上僭兩目昏花羞明翳霧眵淚俱多甚則瞳神散大視物無形香附一斤分作四分一分以酒浸一分以鹽水浸一分以蜜浸一分以乳浸每浸三日夜後曬乾各為細末每服二錢隨所用湯劑均可加用或單服亦可白滾湯調下明目散新方治五志之火上攻於目生翳起障赤腫疼痛眵淚羞明視物昏花此方神效當歸草決明冬朮蟬蛻川芎大黃紅花桑白皮山梔薄荷白蒺藜蒼朮木通連翹石膏池菊荊芥赤芍枳殼生地黃芩羌活獨活各一兩上為末每服二錢隨所用湯劑加入亦可單服酒調或蜜湯調下俱可明目丸新方治火之甚者即前明目散加黃連五錢為丸撥雲丸治一切翳膜外障當歸一兩二錢川芎地骨皮白蒺藜密蒙花池菊羌活荊芥各一兩紅花五錢木賊一兩蔓荊子薄荷枳殼甘草各五錢蟬蛻蛇蛻川連各二錢川椒七錢半上藥各為細末煉蜜丸桐子大每服二錢復睛丸治一切目疾當歸蟬蛻檳榔夏枯草胡黃連黃耆白蒺藜各一兩羌活獨活防風細辛枳殼白芍赤芍川芎柴胡青皮陳皮甘草各四錢茯苓三錢白芷二錢木賊七錢蛇蛻藁本各二錢上為細末煉蜜為丸桐子大每服二錢八制保瞳丸治肝腎兩虧瞳神失守視物不明枸杞一斤分作八分先用酒潤透一用蜜拌一用乳拌一用青鹽拌一用黑芝麻拌一用川椒拌一用小茴拌一用獨活拌一用菖蒲拌俱用三錢各炒須不變紅色為佳若變黑色便不效矣各磨細末稍加煉蜜為丸桐子大每服二錢嗅鼻碧雲散治腫脹紅赤昏暗羞明隱澀疼痛風癢鼻塞頭腦痠痛外翳扳睛眵淚稠黏鵝不食草二錢青黛川芎各一錢為細末先噙水滿口每服如米許嗅入鼻內以淚出為度無時此乃開鍋蓋法欲使邪毒不閉令有出路也觀音灸治六淫所侵頭腦痛不可忍麝香西丁等分煬化嵌銅錢孔內逢痛處灸之點藥諸方珍珠散古歌曰不用刀針割全憑此藥方珍珠瑪瑙琥珀珊瑚各錢半以上四味俱用豆腐煮過研月石熊膽各五分筍殼盛烘脆為末冰片四分麝香二分半血竭七分半硃砂細研水飛七分半黃連五分乳香箬上炙乾五分沒藥箬上炙乾五分爐甘石制一兩半各為細末篩過再照分數稱定合為一處研萬匝復以綿紙篩下瓷罐收貯聽用其效如神撥雲退翳丹點一切星障胬肉頑翳老膜諸般實症立開瞽目神效水銀一兩二錢青鉛二兩硼砂一兩六錢火硝一兩二錢明礬一兩二錢皂礬一兩防風草決明木賊威靈仙龍膽草荊芥各二錢半歸尾五錢前六味中先將水銀溶化入鉛攪勻傾出研細然後每味各研和勻次將後七味水五盞煎至三盞去渣再煎至將干下前六味末結胎鹽泥固濟以三炷香為度先文後武取掇至地上出火氣於上刮取其色要淡黃色為佳每升藥五分配上好煅過爐甘石一錢冰片硃砂雄黃珍珠各二分白丁香飛過硇砂各一分元明粉五釐共研極細瓷瓶收貯待用祕製眼藥方治一切目疾爐甘石不拘多少用童便浸透煎滾去童便以清水漂出臭氣裝在泥罐內上用銀罐蓋好桑柴火燒至硫黃色為度取出擂細用清水飛盡砂曬乾每淨甘石一斤配蔥一斤薑二兩敲汁收在甘石內拌勻再裝入罐內仍燒至硫黃色取出名五烹法點一切天行赤眼入後藥再製名虎液法荊芥赤芍薄荷蘇木紫蘇藁本防風牛蒡子羌活茺蔚子連翹蘄艾蒼耳子槐角每甘石一斤配每藥一兩煎湯將甘石拌勻燒至硫黃色取出點一切翳膜入後藥再製名龍砂法青葙子蕤仁車前子密蒙花白芍枸杞子天麻山梔白芷蔓荊子連翹蟬衣穀精草乾葛桑白皮當歸檳榔夏枯草黃柏旋覆花草決明白豆蔻黃芩天花粉荊芥柴胡龍膽草薄荷升麻池菊元參生地石決明防風木賊草白蒺藜白朮細辛香附黃連每甘石一斤配藥每一兩煎湯將甘石拌勻燒至硫黃色取出點一切星障入後藥再製名鳳屑法千里光鵝不食草經霜桑葉三味煎湯用原蠶砂桑柴灰攤在綿紙上以湯淋水拌在甘石內燒至硫黃色為度取出放露天出火氣候用點一切年深老障凝翳諸藥分兩悉以甘石一斤為準若甘石多少藥料亦須增減制三黃法每制甘石一兩配黃芩黃柏各二錢黃連五錢煎濃湯拌在甘石內曬乾名三黃散配眼藥法三黃散四分珍珠粉一分制甘石二錢半月石一分共擂極細加冰片八釐研勻瓷瓶收貯聽用眼癬方鳳凰油治一切火毒雞子黃不拘多少陳菜油熬枯去雞黃收貯聽用水眼藥治沿爛硼砂枯礬等分研細白蜂蜜為君拌勻燉透不時搽抹紅淨藥治燥熱眼癬紅棗緑礬杏仁膽礬少減白果肉紅棗去核將緑礬嵌滿濕粗紙包裹火內燒紅透為度勿令焦枯取出以杏仁等共打和研勻陰乾臨用時須加黃柏白芷菊葉泡水同燉取水洗淨清淨藥治風熱眼癬青蔥為君杏仁為臣銅青為佐膽礬為使先將青蔥取汁杏仁研霜熬入銅青膽礬收干臨用時滾水開之洗淨黑癬藥治濕毒眼癬滿面膿窠青蔥杏仁松香松香杏仁等分研大管青蔥將二味裝滿入陳菜油內浸透燒研細臨用麻油調或鳳凰油調滾眼皮法治心脾火浮招風沿爛胡桃肉去衣棗子肉去皮杏仁去衣膽礬冰片少許共研細勻為丸隨時滾眼皮
